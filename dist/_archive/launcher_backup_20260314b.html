<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hydra Live Launcher</title>
  <style>
    :root {
      --bg: #050508;
      --panel: #0a0a0e;
      --line: #1a1a22;
      --text: #fff;
      --muted: #bbb;
      --accent: #42d08f;
      --danger: #c44;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 55vw 1fr;
      gap: 6px;
      padding: 6px;
    }
    #leftCol {
      display: flex;
      flex-direction: column;
      gap: 0;
      min-width: 360px;
      overflow: hidden;
    }
    #stage {
      border: 1px solid #111;
      border-radius: 6px 6px 0 0;
      overflow: hidden;
      background: #000;
      flex-shrink: 1;
      min-height: 200px;
    }
    #stage canvas { width: 100%; height: 100%; display: block; object-fit: contain; }
    #controls {
      background: var(--panel);
      border: 1px solid #111;
      border-top: 0;
      border-radius: 0 0 6px 6px;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #panel {
      border: 1px solid #111;
      border-radius: 6px;
      background: var(--panel);
      display: flex;
      flex-direction: column;
      min-width: 300px;
      overflow: hidden;
    }
    #toolbar {
      padding: 10px;
      border-bottom: 1px solid var(--line);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .btn {
      border: 1px solid #222;
      background: #111;
      color: var(--muted);
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }
    .btn:hover { border-color: #444; color: #ddd; }
    .btn.main { background: #153028; border-color: var(--accent); color: var(--accent); font-weight: 700; }
    .btn.stop { background: #2a0a0a; border-color: var(--danger); color: var(--danger); font-weight: 700; }
    .btn.stop:hover { background: #3a1010; border-color: #e55; color: #e55; }
    #status {
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      min-height: 34px;
      color: var(--muted);
      font-size: 12px;
    }
    #editorWrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    #editor {
      width: 100%;
      height: 100%;
      min-height: 200px;
      resize: none;
      border: 0;
      outline: 0;
      padding: 12px;
      background: #08080c;
      color: #888;
      font-family: "JetBrains Mono", "SFMono-Regular", Menlo, monospace;
      font-size: 14px;
      line-height: 1.48;
    }
    #globalControls {
      border-bottom: 1px solid var(--line);
      padding: 6px 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--muted);
    }
    #globalControls label { display: flex; align-items: center; gap: 4px; white-space: nowrap; }
    #globalControls input[type="range"] { flex: 1; min-width: 120px; height: 4px; accent-color: var(--accent); }
    #globalControls span { width: 28px; text-align: right; font-variant-numeric: tabular-nums; }
    #presets {
      border-bottom: 1px solid var(--line);
      padding: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      max-height: 34vh;
      overflow: auto;
    }
    .presetBtn {
      border: 1px solid #222;
      background: #0e0e12;
      color: var(--muted);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
      max-width: 280px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .presetBtn:hover { border-color: #444; color: var(--accent); }
    .presetBtn.active { border-color: var(--accent); background: #0c1a14; color: var(--accent); font-weight: 600; }
    .presetBtn.saved {
      border-color: var(--accent); background: #0c1a14; color: var(--accent);
      transition: all 0.15s ease-out;
    }
    @keyframes saveFlash {
      0%   { background: var(--accent); color: #000; border-color: var(--accent); }
      100% { background: #0c1a14; color: var(--accent); border-color: var(--accent); }
    }
    #autoplayBar {
      border-bottom: 1px solid var(--line);
      padding: 8px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 12px;
    }
    #autoplayBar label { color: var(--muted); white-space: nowrap; }
    #autoplayBar input[type="number"] {
      width: 56px; padding: 4px 6px;
      border: 1px solid #222; border-radius: 6px;
      background: #0a0a0e; color: var(--muted);
      font-size: 12px; text-align: center;
    }
    #autoplayBar select {
      padding: 4px 6px;
      border: 1px solid #222; border-radius: 6px;
      background: #0a0a0e; color: var(--muted);
      font-size: 12px;
    }
    #autoplayBar .divider { width: 1px; height: 20px; background: var(--line); }
    #autoplayProgress {
      flex: 1; height: 4px; min-width: 60px;
      background: #151518; border-radius: 2px; overflow: hidden;
    }
    #autoplayProgressFill {
      height: 100%; width: 0%; background: var(--accent);
    }
    #beatGrid {
      flex: 1; min-width: 80px; display: flex; gap: 1px; align-items: center; height: 16px;
    }
    #beatGrid .beat-group {
      display: flex; gap: 1px; flex: 1; height: 100%;
    }
    #beatGrid .beat-group + .beat-group { margin-left: 3px; }
    #beatGrid .beat-step {
      flex: 1; height: 100%; background: #151518; border-radius: 2px; transition: background 0.05s;
    }
    #beatGrid .beat-step.lit { background: var(--accent); }
    #beatGrid .beat-group:nth-child(odd) .beat-step.lit { background: #3ab8e0; }
    #beatGrid .beat-group:nth-child(even) .beat-step.lit { background: var(--accent); }
    #notesBar {
      border-top: 1px solid var(--line);
      padding: 6px 10px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 80px;
    }
    #notesArea {
      width: 100%; box-sizing: border-box;
      flex: 1;
      resize: none;
      overflow-y: auto;
      border: 1px solid #222; border-radius: 6px;
      background: #0a0a0e; color: var(--muted);
      font-family: "JetBrains Mono", "SFMono-Regular", Menlo, monospace;
      font-size: 11px; line-height: 1.4;
      padding: 6px 8px;
      outline: none;
    }
    #notesArea:focus { border-color: #333; }
    #notesArea::placeholder { color: #333; }
    #app.audience #panel { display: none; }
    #app.audience {
      grid-template-columns: 1fr;
      gap: 0;
      padding: 0;
    }
    #app.audience #stage {
      border: 0;
      border-radius: 0;
      width: 100%;
      height: 100%;
    }
    @media (max-width: 1200px) {
      #app { grid-template-columns: 1fr; }
      #panel { min-width: 0; }
      #stage { min-height: 40vh; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="leftCol">
      <div id="stage"></div>
      <div id="controls">
        <div id="toolbar">
          <button id="runAllBtn" class="btn main">Run (Cmd/Ctrl+Shift+Enter)</button>
          <button id="openOutBtn" class="btn">Open Output</button>
          <button id="startAudioBtn" class="btn">Start Audio</button>
          <button id="saveBtn" class="btn">Save</button>
          <button id="saveAsBtn" class="btn">Save As</button>
          <button id="stopBtn" class="btn stop">Stop</button>
          <button id="openNdiBtn" class="btn" style="display:none;">NDI Out: Off</button>
          <button id="fsOutBtn" class="btn" style="display:none;">Fullscreen Output</button>
          <button id="toggleCodeBtn" class="btn" style="display:none;">Audience Mode</button>
          <span style="display:flex;align-items:center;gap:6px;margin-left:auto;">
            <label style="display:flex;align-items:center;gap:4px;white-space:nowrap;font-size:12px;color:var(--muted);">Res
              <select id="resolutionCtrl" style="padding:2px 4px;border:1px solid var(--line);border-radius:4px;background:#0a0a0e;color:var(--muted);font-size:12px;">
                <option value="auto">Auto (fit stage)</option>
                <option value="1920x1200" selected>1920x1200 (16:10 Projector)</option>
                <option value="1920x1080">1920x1080 (16:9 HD)</option>
                <option value="1280x720">1280x720 (720p)</option>
                <option value="3840x2160">3840x2160 (4K)</option>
                <option value="1080x1920">1080x1920 (9:16 Vertical)</option>
                <option value="1080x1350">1080x1350 (4:5 Portrait)</option>
                <option value="1080x1080">1080x1080 (1:1 Square)</option>
                <option value="custom">Custom...</option>
              </select>
            </label>
            <span id="resLabel" style="color:var(--muted);font-size:12px;"></span>
            <div class="divider" style="width:1px;height:16px;background:var(--line);"></div>
            <button id="autoplayBtn" class="btn" style="padding:4px 8px;">Autoplay</button>
            <select id="autoplayMode" style="padding:2px 4px;border:1px solid var(--line);border-radius:4px;background:#0a0a0e;color:var(--muted);font-size:12px;">
              <option value="time">Time</option>
              <option value="bars" selected>Bars (BPM)</option>
            </select>
            <label id="autoplayTimeLabel" style="display:none;font-size:12px;color:var(--muted);">Seconds: <input type="number" id="autoplaySeconds" value="120" min="1" max="9999" style="width:50px;padding:2px 4px;border:1px solid var(--line);border-radius:4px;background:#0a0a0e;color:var(--muted);font-size:12px;"></label>
            <label id="autoplayBarsLabel" style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--muted);">Bars:
              <select id="autoplayBars" style="padding:2px 4px;border:1px solid var(--line);border-radius:4px;background:#0a0a0e;color:var(--muted);font-size:12px;">
                <option value="8" selected>8</option>
                <option value="16">16</option>
                <option value="32">32</option>
                <option value="64">64</option>
                <option value="128">128</option>
              </select>
            </label>
            <span id="autoplayBpmDisplay" style="display:none;color:var(--muted);font-size:12px;"></span>
            <input type="hidden" id="autoplayBpm" value="120">
            <span id="autoplayCountdown" style="color:var(--muted);font-variant-numeric:tabular-nums;font-size:12px;"></span>
            <div class="divider" style="width:1px;height:16px;background:var(--line);"></div>
            <label style="display:flex;align-items:center;gap:4px;white-space:nowrap;font-size:12px;color:var(--muted);">BPM <span id="bpmVal" style="width:32px;text-align:right;font-variant-numeric:tabular-nums;">30</span></label>
            <button id="tapTempoBtn" class="btn" style="padding:4px 8px;">Tap</button>
            <button id="linkBtn" class="btn" style="padding:4px 8px;display:none;">Link</button>
            <span id="linkPeers" style="display:none;color:var(--muted);font-size:12px;"></span>
          </span>
        </div>
        <div id="status">Ready</div>
        <div id="presets"></div>
        <div id="globalControls">
          <button id="resetFiltersBtn" class="btn" style="padding:4px 8px;font-size:11px;">Reset</button>
          <label>Hue <input type="range" id="hueCtrl" min="0" max="360" value="0"><span id="hueVal">0</span>°</label>
          <label>Sat <input type="range" id="satCtrl" min="0" max="300" value="100"><span id="satVal">100</span>%</label>
          <label>Bright <input type="range" id="brightCtrl" min="0" max="300" value="100"><span id="brightVal">100</span>%</label>
          <label>Contrast <input type="range" id="contrastCtrl" min="0" max="300" value="100"><span id="contrastVal">100</span>%</label>
          <div class="divider" style="width:1px;height:16px;background:var(--line);"></div>
          <label>Speed <input type="range" id="speedCtrl" min="0" max="4" step="0.1" value="1"><span id="speedVal">1.0</span>x</label>
        </div>
        <div id="autoplayBar" style="display:none;">
          <div id="beatGrid"></div>
          <div id="autoplayProgress" style="display:none;"><div id="autoplayProgressFill"></div></div>
        </div>
        <div id="notesBar">
          <textarea id="notesArea" spellcheck="false" placeholder="Notes — preset info, TD URL, reminders..."></textarea>
        </div>
      </div>
    </div>
    <div id="panel">
      <div id="editorWrap">
        <textarea id="editor" spellcheck="false" placeholder="Hydra live code here..."></textarea>
      </div>
    </div>
  </div>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
  <style>
    /* Hydra-style transparent CodeMirror theme */
    .CodeMirror {
      background: transparent !important;
      color: #eef !important;
      font-family: "JetBrains Mono", "SFMono-Regular", Menlo, monospace !important;
      font-size: 14px !important;
      line-height: 1.55 !important;
      height: 100% !important;
      padding: 8px 4px;
    }
    .CodeMirror-gutters { background: transparent !important; border: 0 !important; }
    .CodeMirror-linenumber { color: #556 !important; }
    .CodeMirror-cursor { border-left-color: #fff !important; }
    .CodeMirror-selected { background: rgba(100,140,255,0.25) !important; }
    .CodeMirror-focused .CodeMirror-selected { background: rgba(100,140,255,0.35) !important; }
    .CodeMirror-line { padding-left: 4px !important; }
    .CodeMirror-activeline-background { background: rgba(255,255,255,0.04) !important; }
    /* Flash highlight when code is executed */
    .cm-ran-flash { background: rgba(66, 208, 143, 0.35) !important; transition: background 0s; }
    .cm-ran-flash-fade { background: transparent !important; transition: background 0.8s ease-out; }
    /* Line background highlight like official Hydra */
    .CodeMirror pre.CodeMirror-line,
    .CodeMirror pre.CodeMirror-line-like {
      background: rgba(10, 10, 16, 0.7);
      border-radius: 2px;
      padding: 1px 4px !important;
    }
    /* Syntax colors */
    .cm-s-hydra .cm-keyword { color: #c792ea; }
    .cm-s-hydra .cm-atom { color: #f78c6c; }
    .cm-s-hydra .cm-number { color: #f78c6c; }
    .cm-s-hydra .cm-def { color: #82aaff; }
    .cm-s-hydra .cm-variable { color: #eeffff; }
    .cm-s-hydra .cm-variable-2 { color: #eeffff; }
    .cm-s-hydra .cm-property { color: #c3e88d; }
    .cm-s-hydra .cm-operator { color: #89ddff; }
    .cm-s-hydra .cm-string { color: #c3e88d; }
    .cm-s-hydra .cm-string-2 { color: #f07178; }
    .cm-s-hydra .cm-comment { color: #e0a050; font-style: italic; }
    .cm-s-hydra .cm-bracket { color: #89ddff; }
    .cm-s-hydra .cm-tag { color: #f07178; }
    .cm-s-hydra .cm-error { color: #ff5370; }
    .cm-s-hydra .cm-builtin { color: #ffcb6b; }
    .CodeMirror-scrollbar-filler { background: transparent !important; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/edit/matchbrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/edit/closebrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/selection/active-line.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/comment/comment.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hydra-synth/dist/hydra-synth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/obs-websocket-js@5.0.7/dist/obs-ws.global.js"></script>
  <script src="https://unpkg.com/prettier@3.3.3/standalone.js"></script>
  <script src="https://unpkg.com/prettier@3.3.3/plugins/babel.js"></script>
  <script src="https://unpkg.com/prettier@3.3.3/plugins/estree.js"></script>
  <script>
    (function () {
      const STORAGE_EDITOR = 'hydra-live-editor-v1'
      const STORAGE_OBS_NDI = 'hydra-live-obs-ndi-v1'
      const STORAGE_PRESET_NAME = 'hydra-live-preset-name'
      const STORAGE_PRESET_FILE = 'hydra-live-preset-file'
      const DEFAULT_OBS_URL = 'ws://127.0.0.1:4455'
      const appEl = document.getElementById('app')
      const stageEl = document.getElementById('stage')
      const statusEl = document.getElementById('status')
      const editorEl = document.getElementById('editor')
      const presetsEl = document.getElementById('presets')
      const saveBtn = document.getElementById('saveBtn')
      const saveAsBtn = document.getElementById('saveAsBtn')
      var currentPresetFile = localStorage.getItem(STORAGE_PRESET_FILE) || null
      var currentPresetName = localStorage.getItem(STORAGE_PRESET_NAME) || null
      const runAllBtn = document.getElementById('runAllBtn')
      const startAudioBtn = document.getElementById('startAudioBtn')
      const openOutBtn = document.getElementById('openOutBtn')
      const openNdiBtn = document.getElementById('openNdiBtn')
      const fsOutBtn = document.getElementById('fsOutBtn')
      const toggleCodeBtn = document.getElementById('toggleCodeBtn')

      let hydra = null
      let hydraCanvas = null
      let audioBootstrapCode = ''
      fetch('/dist/audio-bootstrap.js', { cache: 'no-store' })
        .then(function(r) { if (!r.ok) throw new Error('not found'); return r.text() })
        .then(function(t) { audioBootstrapCode = t; console.log('Audio bootstrap loaded.') })
        .catch(function() { console.warn('audio-bootstrap.js not found, skipping.') })
      let audienceWindow = null
      let outputStream = null
      let outputAttachTimer = null
      let obsClient = null
      let obsConnected = false
      let ndiActive = false
      let ndiOutputName = ''
      var broadcastSupported = typeof BroadcastChannel !== 'undefined'
      var codeCh = broadcastSupported ? new BroadcastChannel('hydra-live-code') : null

      // WebSocket relay for TD / cross-browser output
      var relayWs = null
      var relayRetryMs = 500
      var canvasStream = null
      var rtcPeers = {}

      function getCanvasStream () {
        if (!hydraCanvas || !hydraCanvas.captureStream) return null
        if (!canvasStream) canvasStream = hydraCanvas.captureStream(60)
        return canvasStream
      }

      function handleSignaling (msg) {
        if (msg.type === 'viewer-ready' && msg.viewerId) {
          var stream = getCanvasStream()
          if (!stream) return
          var pc = new RTCPeerConnection()
          rtcPeers[msg.viewerId] = pc
          stream.getTracks().forEach(function (t) {
            var sender = pc.addTrack(t, stream)
            // Max out quality — no compression artifacts
            if (sender.setParameters) {
              var params = sender.getParameters()
              if (!params.encodings || !params.encodings.length) {
                params.encodings = [{}]
              }
              params.encodings[0].maxBitrate = 50000000 // 50 Mbps
              params.encodings[0].maxFramerate = 60
              if (params.encodings[0].scaleResolutionDownBy !== undefined) {
                params.encodings[0].scaleResolutionDownBy = 1.0 // no downscale
              }
              params.degradationPreference = 'maintain-resolution'
              sender.setParameters(params).catch(function () {})
            }
          })
          pc.onicecandidate = function (e) {
            if (e.candidate && relayWs && relayWs.readyState === 1) {
              relayWs.send(JSON.stringify({ type: 'ice-candidate', candidate: e.candidate, viewerId: msg.viewerId }))
            }
          }
          pc.createOffer().then(function (offer) {
            // Force high bitrate in SDP
            var sdp = offer.sdp
              .replace(/b=AS:\d+/g, 'b=AS:50000')
              .replace(/b=TIAS:\d+/g, 'b=TIAS:50000000')
            return pc.setLocalDescription(new RTCSessionDescription({ type: 'offer', sdp: sdp }))
          }).then(function () {
            if (relayWs && relayWs.readyState === 1) {
              relayWs.send(JSON.stringify({ type: 'offer', sdp: pc.localDescription, viewerId: msg.viewerId }))
            }
          })
        } else if (msg.type === 'answer' && msg.viewerId && rtcPeers[msg.viewerId]) {
          rtcPeers[msg.viewerId].setRemoteDescription(new RTCSessionDescription(msg.sdp))
        } else if (msg.type === 'ice-candidate' && msg.viewerId && rtcPeers[msg.viewerId]) {
          rtcPeers[msg.viewerId].addIceCandidate(new RTCIceCandidate(msg.candidate))
        }
      }

      function connectRelay () {
        try {
          relayWs = new WebSocket('ws://' + window.location.host)
          relayWs.onopen = function () { relayRetryMs = 500 }
          relayWs.onmessage = function (event) {
            try { handleSignaling(JSON.parse(event.data)) } catch (err) {}
          }
          relayWs.onclose = function () { relayWs = null; setTimeout(connectRelay, relayRetryMs); relayRetryMs = Math.min(relayRetryMs * 2, 5000) }
          relayWs.onerror = function () { if (relayWs) relayWs.close() }
        } catch (err) { relayWs = null }
      }
      connectRelay()

      function setStatus (text, isError) {
        statusEl.textContent = text
        statusEl.style.color = isError ? 'var(--danger)' : 'var(--muted)'
      }

      function highlightActivePreset () {
        var btns = presetsEl.querySelectorAll('.presetBtn')
        btns.forEach(function (b) { b.classList.remove('active') })
        if (!currentPresetFile) return
        btns.forEach(function (b) {
          if (b.title === currentPresetFile) b.classList.add('active')
        })
      }

      function flashSavedPreset () {
        if (!currentPresetFile) return
        var btns = presetsEl.querySelectorAll('.presetBtn')
        btns.forEach(function (b) {
          if (b.title === currentPresetFile) {
            b.style.animation = 'saveFlash 0.6s ease-out'
            b.addEventListener('animationend', function () {
              b.style.animation = ''
            }, { once: true })
          }
        })
      }

      function getObsNdiPrefs () {
        try {
          const raw = localStorage.getItem(STORAGE_OBS_NDI)
          if (!raw) return { url: DEFAULT_OBS_URL, password: '', outputName: '' }
          const parsed = JSON.parse(raw)
          return {
            url: parsed.url || DEFAULT_OBS_URL,
            password: parsed.password || '',
            outputName: parsed.outputName || ''
          }
        } catch (error) {
          return { url: DEFAULT_OBS_URL, password: '', outputName: '' }
        }
      }

      function saveObsNdiPrefs (prefs) {
        localStorage.setItem(STORAGE_OBS_NDI, JSON.stringify({
          url: prefs.url || DEFAULT_OBS_URL,
          password: prefs.password || '',
          outputName: prefs.outputName || ''
        }))
      }

      function setNdiButtonState () {
        if (!openNdiBtn) return
        openNdiBtn.textContent = ndiActive ? 'NDI Out: On' : 'NDI Out: Off'
        if (ndiActive) {
          openNdiBtn.classList.add('main')
        } else {
          openNdiBtn.classList.remove('main')
        }
      }

      function updateNdiConnectionState (connected) {
        obsConnected = connected
        if (!connected) {
          ndiActive = false
          setNdiButtonState()
        }
      }

      async function ensureObsConnected () {
        const prefs = getObsNdiPrefs()
        if (typeof window.OBSWebSocket !== 'function') {
          throw new Error('OBS websocket client not loaded.')
        }
        if (!obsClient) {
          obsClient = new window.OBSWebSocket()
          obsClient.on('ConnectionClosed', function () {
            updateNdiConnectionState(false)
          })
          obsClient.on('ConnectionError', function () {
            updateNdiConnectionState(false)
          })
        }
        if (obsConnected) return

        try {
          await obsClient.connect(prefs.url || DEFAULT_OBS_URL, prefs.password || '')
          updateNdiConnectionState(true)
          return
        } catch (error) {
          const promptedUrl = window.prompt('OBS WebSocket URL', prefs.url || DEFAULT_OBS_URL)
          if (promptedUrl === null) throw error
          const promptedPassword = window.prompt('OBS WebSocket password (leave blank if disabled)', prefs.password || '')
          if (promptedPassword === null) throw error
          const nextPrefs = {
            url: promptedUrl.trim() || DEFAULT_OBS_URL,
            password: promptedPassword,
            outputName: prefs.outputName || ''
          }
          saveObsNdiPrefs(nextPrefs)
          await obsClient.connect(nextPrefs.url, nextPrefs.password || '')
          updateNdiConnectionState(true)
        }
      }

      async function resolveNdiOutputName () {
        const prefs = getObsNdiPrefs()
        let outputs = []
        try {
          const list = await obsClient.call('GetOutputList')
          outputs = Array.isArray(list.outputs) ? list.outputs : []
        } catch (error) {
          outputs = []
        }

        if (prefs.outputName && outputs.some(function (o) { return o.outputName === prefs.outputName })) {
          ndiOutputName = prefs.outputName
          return ndiOutputName
        }

        const guessed = outputs.find(function (o) {
          const label = `${o.outputName || ''} ${o.outputKind || ''}`.toLowerCase()
          return label.includes('ndi') || label.includes('distroav')
        })
        if (guessed && guessed.outputName) {
          ndiOutputName = guessed.outputName
          prefs.outputName = guessed.outputName
          saveObsNdiPrefs(prefs)
          return ndiOutputName
        }

        const prompted = window.prompt(
          'OBS output name for NDI (match Output Name in DistroAV settings)',
          prefs.outputName || 'HydraVJ'
        )
        if (prompted === null) {
          throw new Error('NDI output name not set.')
        }
        ndiOutputName = prompted.trim()
        if (!ndiOutputName) {
          throw new Error('NDI output name cannot be empty.')
        }
        prefs.outputName = ndiOutputName
        saveObsNdiPrefs(prefs)
        return ndiOutputName
      }

      async function fetchNdiActiveState (outputName) {
        const status = await obsClient.call('GetOutputStatus', { outputName: outputName })
        return !!status.outputActive
      }

      async function toggleNdiOutput (forceConfigure) {
        try {
          await ensureObsConnected()
          if (forceConfigure) {
            const prefs = getObsNdiPrefs()
            const prompted = window.prompt(
              'OBS output name for NDI (match Output Name in DistroAV settings)',
              prefs.outputName || ndiOutputName || 'HydraVJ'
            )
            if (prompted === null) return
            prefs.outputName = prompted.trim()
            saveObsNdiPrefs(prefs)
            ndiOutputName = prefs.outputName
          }
          const outputName = await resolveNdiOutputName()
          const active = await fetchNdiActiveState(outputName)
          if (active) {
            await obsClient.call('StopOutput', { outputName: outputName })
            ndiActive = false
            setNdiButtonState()
            setStatus(`NDI output stopped in OBS (${outputName}).`, false)
          } else {
            await obsClient.call('StartOutput', { outputName: outputName })
            ndiActive = true
            setNdiButtonState()
            setStatus(`NDI output started in OBS (${outputName}).`, false)
          }
        } catch (error) {
          ndiActive = false
          setNdiButtonState()
          setStatus(`NDI toggle failed: ${error.message}`, true)
          console.error(error)
        }
      }

      function ensureAudioStub () {
        if (window.a) return
        window.a = {
          fft: [0, 0, 0, 0],
          vol: 0,
          bins: [0, 0, 0, 0],
          setBins: function (n) {
            var size = Math.max(1, Number(n) || 4)
            this.fft = new Array(size).fill(0)
            this.bins = new Array(size).fill(0)
            for (var i = 0; i < size; i++) {
              (function (idx) {
                window['a' + idx] = function (scale, offset) {
                  var s = scale === undefined ? 1 : scale
                  var o = offset === undefined ? 0 : offset
                  return function () { return window.a.fft[idx] * s + o }
                }
              })(i)
            }
          },
          setSmooth: function () {},
          setCutoff: function () {},
          setScale: function () {},
          setMax: function () {},
          show: function () {},
          hide: function () {},
          onBeat: function () {}
        }
        window.a.setBins(4)
      }

      function startAudio () {
        ensureAudioStub()
        if (!window.a) return
        if (window.a.context && window.a.context.state === 'suspended') {
          window.a.context.resume().catch(function () {})
        }
        if (typeof window.a.show === 'function') window.a.show()
        setStatus('Audio started (or stub active).', false)
      }

      // ---- Resolution / aspect ratio ----
      var currentResW = 0
      var currentResH = 0
      var resolutionMode = '1920x1200'

      function getResolution () {
        return { w: currentResW, h: currentResH, mode: resolutionMode }
      }

      function parseResolution (val) {
        if (val === 'auto' || val === 'custom') return null
        var parts = val.split('x')
        return { w: parseInt(parts[0], 10), h: parseInt(parts[1], 10) }
      }

      function fitCanvas () {
        if (!hydraCanvas) return
        var res = parseResolution(resolutionMode)
        if (res) {
          // Fixed resolution — set canvas to exact pixel dimensions
          hydraCanvas.width = res.w
          hydraCanvas.height = res.h
          currentResW = res.w
          currentResH = res.h
          // Apply aspect ratio to stage so preview isn't stretched
          stageEl.style.aspectRatio = res.w + '/' + res.h
          stageEl.style.maxHeight = '100%'
        } else {
          // Auto — fill stage area
          stageEl.style.aspectRatio = ''
          stageEl.style.maxHeight = ''
          var rect = stageEl.getBoundingClientRect()
          hydraCanvas.width = Math.max(640, Math.floor(rect.width))
          hydraCanvas.height = Math.max(360, Math.floor(rect.height))
          currentResW = hydraCanvas.width
          currentResH = hydraCanvas.height
        }
        if (typeof setResolution === 'function') {
          setResolution(hydraCanvas.width, hydraCanvas.height)
        }
        // Update label
        var resLabel = document.getElementById('resLabel')
        if (resLabel) resLabel.textContent = currentResW + 'x' + currentResH
      }

      function parsePresetMarkdown (source) {
        const fenced = source.match(/```(?:js|javascript|hydra)?\s*([\s\S]*?)```/m)
        if (fenced && fenced[1]) return fenced[1].trim()
        return source.trim()
      }

      function parsePresetFilters (source) {
        var match = source.match(/<!-- filters:(.*?) -->/)
        if (match) {
          try { return JSON.parse(match[1]) } catch (e) {}
        }
        return null
      }

      function getCurrentLineRange () {
        const value = editorEl.value
        const pos = editorEl.selectionStart
        const lineStart = value.lastIndexOf('\n', pos - 1) + 1
        const nextNewline = value.indexOf('\n', pos)
        const lineEnd = nextNewline === -1 ? value.length : nextNewline
        return { start: lineStart, end: lineEnd }
      }

      function getCurrentBlockRange () {
        const value = editorEl.value
        const pos = editorEl.selectionStart
        let start = pos
        let end = pos

        while (start > 0) {
          const prevBlank = value.lastIndexOf('\n\n', start - 1)
          if (prevBlank === -1) {
            start = 0
            break
          }
          start = prevBlank + 2
          break
        }

        while (end < value.length) {
          const nextBlank = value.indexOf('\n\n', end)
          if (nextBlank === -1) {
            end = value.length
            break
          }
          end = nextBlank
          break
        }

        return { start: start, end: end }
      }

      var pendingFilters = null

      function cleanupSources () {
        if (!hydra) return
        // stop and detach any video elements on s0-s3
        for (var i = 0; i < 4; i++) {
          var s = hydra.synth['s' + i]
          if (s && s.src && s.src.pause) { s.src.pause(); s.src.src = '' }
          if (s) { s.src = null; s.dynamic = false }
        }
        // clear all buffers to black before new code runs
        hydra.eval('solid(0,0,0,1).out(o0); solid(0,0,0,1).out(o1); solid(0,0,0,1).out(o2); solid(0,0,0,1).out(o3)')
      }

      function runCode (code, label) {
        const snippet = (code || '').trim()
        if (!snippet) {
          setStatus(`${label} is empty.`, true)
          return
        }
        if (!hydra) {
          setStatus(`Cannot run ${label}: Hydra engine not initialized.`, true)
          return
        }
        try {
          // clean up previous video sources and buffers before running new preset
          if (label === 'all code') cleanupSources()
          if (audioBootstrapCode) { hydra.eval(audioBootstrapCode) }
          hydra.eval(snippet)
          // Apply pending filters now that the new code is running
          if (pendingFilters) {
            applyFilterState(pendingFilters)
            pendingFilters = null
          }
          if (codeCh) codeCh.postMessage({ type: 'hydra-code', code: snippet })
          localStorage.setItem('hydra-live-code', JSON.stringify({ code: snippet, ts: Date.now() }))
          if (relayWs && relayWs.readyState === 1) relayWs.send(JSON.stringify({ code: snippet }))
          setStatus(`Ran ${label}.`, false)
        } catch (error) {
          setStatus(`${label} error: ${error.message}`, true)
          console.error(error)
        }
      }

      function runLine () {
        const range = getCurrentLineRange()
        const line = editorEl.value.slice(range.start, range.end)
        try {
          runCode(line, 'line')
        } catch (error) {
          runBlock()
        }
      }

      function runBlock () {
        const range = getCurrentBlockRange()
        runCode(editorEl.value.slice(range.start, range.end), 'block')
      }

      function runAll () {
        runCode(editorEl.value, 'all code')
      }

      function runLineWithFallback () {
        if (!hydra) {
          setStatus('Cannot run line: Hydra engine not initialized.', true)
          return
        }
        const range = getCurrentLineRange()
        const line = editorEl.value.slice(range.start, range.end)
        const snippet = (line || '').trim()
        if (!snippet) {
          setStatus('line is empty.', true)
          return
        }
        try {
          hydra.eval(snippet)
          setStatus('Ran line.', false)
        } catch (error) {
          // Common live-coding case: cursor is on a chain continuation line like `.add(...)`
          // Fall back to the surrounding block so multi-line chains execute.
          const blockRange = getCurrentBlockRange()
          const block = editorEl.value.slice(blockRange.start, blockRange.end).trim()
          if (!block) {
            setStatus(`line error: ${error.message}`, true)
            return
          }
          try {
            hydra.eval(block)
            setStatus('Line failed, ran surrounding block instead.', false)
          } catch (blockError) {
            setStatus(`line error: ${error.message}`, true)
            console.error(blockError)
          }
        }
      }

      async function formatCode () {
        if (!window.prettier || !window.prettierPlugins) {
          setStatus('Formatter unavailable.', true)
          return
        }
        try {
          const formatted = await window.prettier.format(editorEl.value, {
            parser: 'babel',
            plugins: window.prettierPlugins,
            semi: false,
            singleQuote: true
          })
          editorEl.value = formatted
          localStorage.setItem(STORAGE_EDITOR, editorEl.value)
          setStatus('Code formatted.', false)
        } catch (error) {
          setStatus(`Format error: ${error.message}`, true)
        }
      }

      function saveScreenshot () {
        if (!hydraCanvas) return
        const link = document.createElement('a')
        link.download = `hydra-${Date.now()}.png`
        link.href = hydraCanvas.toDataURL('image/png')
        link.click()
        setStatus('Screenshot saved.', false)
      }

      function getOutputStream () {
        if (!hydraCanvas || !hydraCanvas.captureStream) return null
        const hasLiveTrack = outputStream &&
          outputStream.getVideoTracks &&
          outputStream.getVideoTracks().some(function (track) { return track.readyState === 'live' })
        if (!hasLiveTrack) {
          outputStream = hydraCanvas.captureStream(60)
        }
        return outputStream
      }

      function attachOutputStream (win) {
        if (!win || win.closed) return false
        // Try both video IDs for compat with output.html and audience.html
        var video = null
        try { video = win.document.getElementById('v') || win.document.getElementById('audienceVideo') } catch (e) { return false }
        if (!video) return false

        const stream = getOutputStream()
        if (!stream) {
          setStatus('captureStream not supported in this browser.', true)
          return false
        }

        if (video.srcObject !== stream) {
          video.srcObject = stream
          video.muted = true
          video.autoplay = true
          video.playsInline = true
          video.play().catch(function () {})
        }
        return true
      }

      function attachOpenOutputs () {
        if (audienceWindow && !audienceWindow.closed) {
          return attachOutputStream(audienceWindow)
        }
        return false
      }

      function startOutputAttachLoop () {
        if (outputAttachTimer) return
        outputAttachTimer = setInterval(function () {
          const hasOpenTarget = audienceWindow && !audienceWindow.closed
          if (!hasOpenTarget) {
            clearInterval(outputAttachTimer)
            outputAttachTimer = null
            return
          }
          attachOpenOutputs()
        }, 300)
      }

      function openOutput () {
        if (audienceWindow && !audienceWindow.closed) {
          if (attachOutputStream(audienceWindow)) {
            audienceWindow.focus()
            setStatus('Output window focused.', false)
            return
          }
        }

        const url = new URL('/dist/output.html', window.location.href).toString()
        var outW = currentResW || 1280
        var outH = currentResH || 720
        // Cap popup size to screen bounds
        outW = Math.min(outW, screen.availWidth - 40)
        outH = Math.min(outH, screen.availHeight - 80)
        const win = window.open(url, 'hydra-output', 'width=' + outW + ',height=' + outH)
        if (!win) {
          setStatus('Popup blocked. Allow popups for this site.', true)
          return
        }

        audienceWindow = win

        // Wait for the output page to load, then attach the raw canvas stream
        startOutputAttachLoop()
        let tries = 0
        const oneOffTimer = setInterval(function () {
          tries += 1
          if (attachOutputStream(win)) {
            clearInterval(oneOffTimer)
            setStatus('Output connected — uncompressed stream.', false)
            return
          }
          if (tries > 60) {
            clearInterval(oneOffTimer)
            setStatus('Output opened but attach failed. Click Open Output again.', true)
          }
        }, 200)
      }

      function fullscreenOutput () {
        if (!audienceWindow || audienceWindow.closed) {
          openOutput()
          return
        }
        const v = audienceWindow.document.getElementById('audienceVideo')
        if (v && v.requestFullscreen) {
          audienceWindow.focus()
          v.requestFullscreen().catch(function () {})
        }
      }

      function toggleAudienceMode () {
        const on = !appEl.classList.contains('audience')
        appEl.classList.toggle('audience', on)
        toggleCodeBtn.textContent = on ? 'Exit Audience Mode' : 'Audience Mode'
        if (on && stageEl.requestFullscreen) {
          stageEl.requestFullscreen().catch(function () {})
        }
      }

      async function savePresetAs () {
        const code = cm.getValue().trim()
        if (!code) { setStatus('Nothing to save.', true); return }
        const name = window.prompt('Save as preset name:')
        if (!name || !name.trim()) return
        try {
          const res = await fetch('/api/presets', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name.trim(), code: code, filters: getFilterState() })
          })
          const data = await res.json()
          if (!res.ok) throw new Error(data.error || 'Save failed')
          currentPresetName = name.trim()
          currentPresetFile = data.saved
          localStorage.setItem(STORAGE_PRESET_NAME, currentPresetName)
          localStorage.setItem(STORAGE_PRESET_FILE, currentPresetFile)
          setStatus(`\u2714 Saved: ${currentPresetName}`, false)
          statusEl.style.color = '#4ade80'
          await loadPresets({ suppressStatus: true })
          flashSavedPreset()
        } catch (error) {
          setStatus(`Save failed: ${error.message}`, true)
        }
      }

      async function savePreset () {
        const code = cm.getValue().trim()
        if (!code) { setStatus('Nothing to save.', true); return }
        if (!currentPresetName) { savePresetAs(); return }
        try {
          const res = await fetch('/api/presets', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: currentPresetName, code: code, filters: getFilterState() })
          })
          const data = await res.json()
          if (!res.ok) throw new Error(data.error || 'Save failed')
          setStatus(`\u2714 Saved: ${currentPresetName}`, false)
          statusEl.style.color = '#4ade80'
          await loadPresets({ suppressStatus: true })
          flashSavedPreset()
        } catch (error) {
          setStatus(`Save failed: ${error.message}`, true)
        }
      }

      async function loadPresets (opts) {
        var suppressStatus = opts && opts.suppressStatus;
        try {
          console.log('[hydra] loadPresets: fetching /api/presets...')
          const res = await fetch('/api/presets', { cache: 'no-store' })
          if (!res.ok) throw new Error(`HTTP ${res.status}`)
          const list = await res.json()
          console.log('[hydra] loadPresets: got', list.length, 'presets, presetsEl=', presetsEl)

          presetsEl.innerHTML = ''
          list.forEach(function (entry) {
            const btn = document.createElement('button')
            btn.className = 'presetBtn'
            btn.textContent = entry.name || entry.file
            btn.title = entry.file
            btn.addEventListener('click', async function () {
              try {
                const p = await fetch(`/api/presets/${entry.file}`, { cache: 'no-store' })
                if (!p.ok) throw new Error(`HTTP ${p.status}`)
                const data = await p.json()
                editorEl.value = parsePresetMarkdown(data.content)
                localStorage.setItem(STORAGE_EDITOR, editorEl.value)
                pendingFilters = parsePresetFilters(data.content)
                currentPresetName = entry.name || entry.file.replace(/\.md$/, '')
                currentPresetFile = entry.file
                localStorage.setItem(STORAGE_PRESET_NAME, currentPresetName)
                localStorage.setItem(STORAGE_PRESET_FILE, currentPresetFile)
                setStatus(`Loaded: ${currentPresetName}`, false)
                highlightActivePreset()
              } catch (error) {
                setStatus(`Load failed: ${error.message}`, true)
              }
            })
            presetsEl.appendChild(btn)
          })

          console.log('[hydra] loadPresets: created', list.length, 'buttons. presetsEl.children.length =', presetsEl.children.length)
          if (!suppressStatus) setStatus(`${list.length} presets loaded.`, false)
          highlightActivePreset()

          // Auto-load first preset if editor is empty
          if (!(cm ? cm.getValue() : editorEl.value).trim() && list.length > 0) {
            var first = list[0]
            try {
              var p = await fetch('/api/presets/' + first.file, { cache: 'no-store' })
              var data = await p.json()
              editorEl.value = parsePresetMarkdown(data.content)
              localStorage.setItem(STORAGE_EDITOR, editorEl.value)
              pendingFilters = parsePresetFilters(data.content)
              currentPresetName = first.name || first.file.replace(/\.md$/, '')
              currentPresetFile = first.file
              localStorage.setItem(STORAGE_PRESET_NAME, currentPresetName)
              localStorage.setItem(STORAGE_PRESET_FILE, currentPresetFile)
              runCode(editorEl.value, 'autoloaded: ' + (first.name || first.file))
              setStatus('Loaded: ' + (first.name || first.file), false)
              highlightActivePreset()
            } catch (e) {}
          }
        } catch (error) {
          setStatus(`Preset load failed: ${error.message}`, true)
        }
      }

      function hasWebGL () {
        const probe = document.createElement('canvas')
        const gl = probe.getContext('webgl') || probe.getContext('experimental-webgl')
        return !!gl
      }

      function initHydra () {
        if (!hasWebGL()) {
          throw new Error('WebGL is unavailable. Check browser hardware acceleration settings.')
        }
        const attempts = [
          { detectAudio: true, makeGlobal: true },
          { detectAudio: false, makeGlobal: true }
        ]
        let lastError = null
        for (let i = 0; i < attempts.length; i += 1) {
          try {
            return new Hydra(attempts[i])
          } catch (error) {
            lastError = error
          }
        }
        throw lastError || new Error('Hydra initialization failed.')
      }

      try {
        hydra = initHydra()
      } catch (error) {
        setStatus(`Hydra failed: ${error.message}`, true)
        hydra = null
      }

      if (hydra) {
        hydraCanvas = hydra.canvas
        if (hydraCanvas && hydraCanvas.parentNode) {
          hydraCanvas.parentNode.removeChild(hydraCanvas)
        }
        hydraCanvas.style.width = '100%'
        hydraCanvas.style.height = '100%'
        stageEl.appendChild(hydraCanvas)
      }

      ensureAudioStub()
      fitCanvas()
      if (hydra && typeof solid === 'function') {
        solid(0, 0, 0, 1).out()
      }

      // Init CodeMirror
      var cm = null
      try {
      cm = CodeMirror.fromTextArea(editorEl, {
        mode: 'javascript',
        theme: 'hydra',
        lineNumbers: false,
        matchBrackets: true,
        autoCloseBrackets: true,
        styleActiveLine: true,
        indentWithTabs: false,
        tabSize: 2,
        indentUnit: 2,
        lineWrapping: true,
        extraKeys: {
          'Cmd-Enter': function () { cmRunLine() },
          'Ctrl-Enter': function () { cmRunLine() },
          'Alt-Enter': function () { cmRunAll() },
          'Option-Enter': function () { cmRunAll() },
          'Shift-Cmd-Enter': function () { cmRunAll() },
          'Shift-Ctrl-Enter': function () { cmRunAll() },
          'Cmd-S': function () { savePreset() },
          'Ctrl-S': function () { savePreset() },
          'Shift-Cmd-S': function () { savePresetAs() },
          'Shift-Ctrl-S': function () { savePresetAs() },
          'Shift-Cmd-F': function () { cmFormat() },
          'Shift-Ctrl-F': function () { cmFormat() },
          'Shift-Cmd-H': function () { toggleAudienceMode() },
          'Shift-Ctrl-H': function () { toggleAudienceMode() },
          'Shift-Cmd-N': function () { toggleNdiOutput(false) },
          'Shift-Ctrl-N': function () { toggleNdiOutput(false) },
          'Cmd-/': function () { cm.toggleComment() },
          'Ctrl-/': function () { cm.toggleComment() }
        }
      })
      cm.setValue(localStorage.getItem(STORAGE_EDITOR) || '')
      cm.on('change', function () {
        localStorage.setItem(STORAGE_EDITOR, cm.getValue())
      })

      // Flash executed lines green then fade out
      function cmFlashLines (startLine, endLine) {
        var marks = []
        for (var i = startLine; i <= endLine; i++) {
          marks.push(cm.addLineClass(i, 'background', 'cm-ran-flash'))
        }
        setTimeout(function () {
          marks.forEach(function (_, idx) {
            cm.removeLineClass(startLine + idx, 'background', 'cm-ran-flash')
            cm.addLineClass(startLine + idx, 'background', 'cm-ran-flash-fade')
          })
          setTimeout(function () {
            marks.forEach(function (_, idx) {
              cm.removeLineClass(startLine + idx, 'background', 'cm-ran-flash-fade')
            })
          }, 800)
        }, 120)
      }

      // CodeMirror run helpers
      function cmRunAll () {
        runCode(cm.getValue(), 'all code')
        cmFlashLines(0, cm.lineCount() - 1)
      }
      function cmRunLine () {
        var lineNum = cm.getCursor().line
        var line = cm.getLine(lineNum)
        if (!line.trim()) return
        try {
          if (hydra) { hydra.eval(line); cmBroadcast(line); setStatus('Ran line.', false); cmFlashLines(lineNum, lineNum) }
        } catch (err) { cmRunBlock() }
      }
      function cmRunBlock () {
        var cursor = cm.getCursor()
        var start = cursor.line, end = cursor.line
        while (start > 0 && cm.getLine(start - 1).trim() !== '') start--
        while (end < cm.lineCount() - 1 && cm.getLine(end + 1).trim() !== '') end++
        var block = ''
        for (var i = start; i <= end; i++) block += cm.getLine(i) + '\n'
        runCode(block.trim(), 'block')
        cmFlashLines(start, end)
      }
      function cmBroadcast (code) {
        if (codeCh) codeCh.postMessage({ type: 'hydra-code', code: code })
        localStorage.setItem('hydra-live-code', JSON.stringify({ code: code, ts: Date.now() }))
        if (relayWs && relayWs.readyState === 1) relayWs.send(JSON.stringify({ code: code }))
      }
      async function cmFormat () {
        if (!window.prettier || !window.prettierPlugins) { setStatus('Formatter unavailable.', true); return }
        try {
          var formatted = await window.prettier.format(cm.getValue(), {
            parser: 'babel', plugins: window.prettierPlugins, semi: false, singleQuote: true
          })
          cm.setValue(formatted)
          setStatus('Code formatted.', false)
        } catch (err) { setStatus('Format error: ' + err.message, true) }
      }

      // Override editorEl references to use CodeMirror
      // (for preset loading, autoplay, etc.)
      Object.defineProperty(editorEl, 'value', {
        get: function () { return cm ? cm.getValue() : '' },
        set: function (v) { if (cm) cm.setValue(v) }
      })
      } catch (cmErr) {
        console.error('CodeMirror init failed:', cmErr)
        setStatus('Editor init failed: ' + cmErr.message, true)
      }

      runAllBtn.addEventListener('click', cmRunAll)
      saveBtn.addEventListener('click', savePreset)
      saveAsBtn.addEventListener('click', savePresetAs)
      startAudioBtn.addEventListener('click', startAudio)
      openOutBtn.addEventListener('click', openOutput)
      openNdiBtn.title = 'Click to toggle OBS NDI output. Shift+Click to set output name.'
      openNdiBtn.addEventListener('click', function (event) {
        toggleNdiOutput(!!event.shiftKey)
      })
      fsOutBtn.addEventListener('click', fullscreenOutput)
      toggleCodeBtn.addEventListener('click', toggleAudienceMode)
      document.getElementById('stopBtn').addEventListener('click', function () {
        if (!hydra) return
        // clear all buffers to black and stop any video sources
        hydra.eval('solid(0,0,0,1).out(o0); solid(0,0,0,1).out(o1); solid(0,0,0,1).out(o2); solid(0,0,0,1).out(o3); render(o0)')
        // stop video elements on s0-s3
        for (var i = 0; i < 4; i++) {
          var s = hydra.synth['s' + i]
          if (s && s.src && s.src.pause) { s.src.pause(); s.src.src = '' }
        }
        if (codeCh) codeCh.postMessage({ type: 'hydra-code', code: 'solid(0,0,0,1).out(o0); render(o0)' })
        setStatus('Stopped.', false)
      })

      // Hydra editor-style shortcuts (from Hydra README)
      window.addEventListener('keydown', function (event) {
        const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0
        const ctrlOrCmd = isMac ? event.metaKey : event.ctrlKey

        if (ctrlOrCmd && !event.shiftKey && event.key === 'Enter') {
          event.preventDefault()
          runLineWithFallback()
          return
        }

        if (ctrlOrCmd && event.shiftKey && event.key === 'Enter') {
          event.preventDefault()
          runAll()
          return
        }

        if (event.altKey && event.key === 'Enter') {
          event.preventDefault()
          cmRunAll()
          return
        }

        if (ctrlOrCmd && event.shiftKey && event.key.toLowerCase() === 'h') {
          event.preventDefault()
          toggleAudienceMode()
          return
        }

        if (ctrlOrCmd && event.shiftKey && event.key.toLowerCase() === 'f') {
          event.preventDefault()
          formatCode()
          return
        }

        if (ctrlOrCmd && !event.shiftKey && event.key.toLowerCase() === 's') {
          event.preventDefault()
          savePreset()
          return
        }

        if (ctrlOrCmd && event.shiftKey && event.key.toLowerCase() === 's') {
          event.preventDefault()
          saveScreenshot()
          return
        }

        if (ctrlOrCmd && event.shiftKey && event.key.toLowerCase() === 'n') {
          event.preventDefault()
          toggleNdiOutput(false)
          return
        }
      })

      window.addEventListener('resize', fitCanvas)
      window.__hydraAttachToOutputWindow = function (targetWindow) {
        return attachOutputStream(targetWindow, { cleanStatus: false })
      }
      window.addEventListener('beforeunload', function () {
        if (outputAttachTimer) clearInterval(outputAttachTimer)
        if (outputStream) {
          outputStream.getTracks().forEach(function (t) { t.stop() })
          outputStream = null
        }
      })

      // ---- Autoplay ----
      var autoplayActive = false
      var autoplayTimer = null
      var autoplayIndex = 0
      var autoplayStartTime = 0
      var autoplayAnimFrame = null
      var autoplayPresetList = []
      var autoplayBtnEl = document.getElementById('autoplayBtn')
      var autoplayModeEl = document.getElementById('autoplayMode')
      var autoplaySecondsEl = document.getElementById('autoplaySeconds')
      var autoplayBpmEl = document.getElementById('autoplayBpm')
      var autoplayBarsEl = document.getElementById('autoplayBars')
      var autoplayTimeLabelEl = document.getElementById('autoplayTimeLabel')
      var autoplayBarsLabelEl = document.getElementById('autoplayBarsLabel')
      var autoplayBpmDisplayEl = document.getElementById('autoplayBpmDisplay')
      var autoplayFillEl = document.getElementById('autoplayProgressFill')
      var autoplayCountdownEl = document.getElementById('autoplayCountdown')
      var beatGridEl = document.getElementById('beatGrid')
      var beatGridSteps = []

      function buildBeatGrid (totalBars) {
        beatGridEl.innerHTML = ''
        beatGridSteps = []
        for (var bar = 0; bar < totalBars; bar++) {
          var group = document.createElement('div')
          group.className = 'beat-group'
          for (var b = 0; b < 4; b++) {
            var step = document.createElement('div')
            step.className = 'beat-step'
            group.appendChild(step)
            beatGridSteps.push(step)
          }
          beatGridEl.appendChild(group)
        }
      }

      function updateBeatGrid (completedBeats) {
        for (var i = 0; i < beatGridSteps.length; i++) {
          beatGridSteps[i].classList.toggle('lit', i < completedBeats)
        }
      }

      // Link beat tracking for beat-synced autoplay
      var linkBeat = 0       // absolute beat from Link (updated at ~20Hz)
      var linkStartBeat = 0  // beat when current preset started

      function getCurrentBpm () {
        var liveBpm = parseFloat(bpmValEl.textContent)
        if (liveBpm && liveBpm > 0) return liveBpm
        return Math.max(1, parseInt(autoplayBpmEl.value, 10) || 120)
      }

      function getAutoplayBars () {
        return Math.max(1, parseInt(autoplayBarsEl.value, 10) || 32)
      }

      function getAutoplayDurationMs () {
        if (autoplayModeEl.value === 'bars') {
          var bpm = getCurrentBpm()
          var bars = getAutoplayBars()
          return (bars * 4 / bpm) * 60 * 1000
        }
        return Math.max(1, parseInt(autoplaySecondsEl.value, 10) || 120) * 1000
      }

      function updateAutoplayBpmDisplay () {
        if (autoplayModeEl.value !== 'bars') return
        var bpm = getCurrentBpm()
        var bars = getAutoplayBars()
        var dur = (bars * 4 / bpm) * 60
        autoplayBpmDisplayEl.textContent = bpm + ' BPM \u2022 ' + dur.toFixed(1) + 's'
      }

      function autoplayLoadPreset (index) {
        if (!autoplayPresetList.length) return
        autoplayIndex = index % autoplayPresetList.length
        var entry = autoplayPresetList[autoplayIndex]
        presetsEl.querySelectorAll('.presetBtn').forEach(function (b, i) {
          b.classList.toggle('active', i === autoplayIndex)
        })
        fetch('/api/presets/' + entry.file, { cache: 'no-store' })
          .then(function (r) { return r.json() })
          .then(function (data) {
            editorEl.value = parsePresetMarkdown(data.content)
            localStorage.setItem(STORAGE_EDITOR, editorEl.value)
            pendingFilters = parsePresetFilters(data.content)
            runCode(editorEl.value, 'autoplay: ' + (entry.name || entry.file))
          })
          .catch(function (err) { setStatus('Autoplay load failed: ' + err.message, true) })
      }

      // Called from Link message handler — drives beat-synced transitions
      function autoplayOnLinkBeat (beat) {
        linkBeat = beat
        if (!autoplayActive || autoplayModeEl.value !== 'bars') return
        var totalBars = getAutoplayBars()
        var totalBeats = totalBars * 4
        var elapsed = beat - linkStartBeat
        // Discrete beat-step display — no smooth interpolation
        var completedBeats = Math.floor(elapsed)
        var currentBar = Math.floor(completedBeats / 4) + 1
        var currentBeat = (completedBeats % 4) + 1
        updateBeatGrid(completedBeats)
        autoplayCountdownEl.textContent = 'Bar ' + Math.min(currentBar, totalBars) + '/' + totalBars + ' beat ' + currentBeat
        updateAutoplayBpmDisplay()
        // Transition on bar boundary
        if (elapsed >= totalBeats) {
          // Cancel the fallback timer so we don't double-fire
          if (autoplayTimer) { clearTimeout(autoplayTimer); autoplayTimer = null }
          if (autoplayAnimFrame) { cancelAnimationFrame(autoplayAnimFrame); autoplayAnimFrame = null }
          linkStartBeat = beat
          autoplayLoadPreset(autoplayIndex + 1)
          // Restart fallback timer for next cycle
          autoplayScheduleBars()
        }
      }

      function autoplayScheduleTime () {
        // Time-based mode: use setTimeout + rAF for countdown
        var duration = getAutoplayDurationMs()
        autoplayStartTime = Date.now()
        if (autoplayTimer) clearTimeout(autoplayTimer)
        autoplayTimer = setTimeout(function () {
          autoplayLoadPreset(autoplayIndex + 1)
          if (autoplayActive) autoplayScheduleTime()
        }, duration)
        if (autoplayAnimFrame) cancelAnimationFrame(autoplayAnimFrame)
        function tick () {
          if (!autoplayActive) return
          var elapsed = Date.now() - autoplayStartTime
          var pct = Math.min(100, (elapsed / duration) * 100)
          autoplayFillEl.style.width = pct + '%'
          var remaining = Math.max(0, Math.ceil((duration - elapsed) / 1000))
          autoplayCountdownEl.textContent = remaining + 's'
          autoplayAnimFrame = requestAnimationFrame(tick)
        }
        tick()
      }

      // Bars mode: always runs a setTimeout + rAF as baseline.
      // When Link is active, autoplayOnLinkBeat overrides the display
      // and fires transitions on real beat boundaries.
      function autoplayScheduleBars () {
        var duration = getAutoplayDurationMs()
        autoplayStartTime = Date.now()
        updateAutoplayBpmDisplay()
        if (autoplayTimer) clearTimeout(autoplayTimer)
        autoplayTimer = setTimeout(function () {
          autoplayLoadPreset(autoplayIndex + 1)
          if (autoplayActive) autoplayScheduleBars()
        }, duration)
        var totalBars = getAutoplayBars()
        if (autoplayAnimFrame) cancelAnimationFrame(autoplayAnimFrame)
        function tick () {
          if (!autoplayActive) return
          var elapsed = Date.now() - autoplayStartTime
          var bpm = getCurrentBpm()
          var msPerBeat = 60000 / bpm
          var elapsedBeats = elapsed / msPerBeat
          var totalBeats = totalBars * 4
          var completedBeats = Math.floor(elapsedBeats)
          updateBeatGrid(completedBeats)
          var currentBar = Math.floor(completedBeats / 4) + 1
          var currentBeat = (completedBeats % 4) + 1
          autoplayCountdownEl.textContent = 'Bar ' + Math.min(currentBar, totalBars) + '/' + totalBars + ' beat ' + currentBeat
          autoplayAnimFrame = requestAnimationFrame(tick)
        }
        tick()
      }

      function startAutoplay () {
        autoplayPresetList = []
        presetsEl.querySelectorAll('.presetBtn').forEach(function (btn, i) {
          autoplayPresetList.push({ name: btn.textContent, file: btn.title })
        })
        if (!autoplayPresetList.length) {
          setStatus('No presets to autoplay.', true)
          return
        }
        autoplayActive = true
        autoplayIndex = 0
        if (currentPresetFile) {
          for (var i = 0; i < autoplayPresetList.length; i++) {
            if (autoplayPresetList[i].file === currentPresetFile) { autoplayIndex = i; break }
          }
        }
        autoplayBtnEl.textContent = 'Stop'
        autoplayBtnEl.classList.add('main')
        autoplayLoadPreset(0)

        if (autoplayModeEl.value === 'bars') {
          buildBeatGrid(getAutoplayBars())
          linkStartBeat = linkBeat
          if (linkActive) {
            // Beat-driven: Link handler does the work, but also start
            // the timer as fallback in case Link messages stop
            updateAutoplayBpmDisplay()
          }
          autoplayScheduleBars()
        } else {
          autoplayScheduleTime()
        }
      }

      function stopAutoplay () {
        autoplayActive = false
        if (autoplayTimer) { clearTimeout(autoplayTimer); autoplayTimer = null }
        if (autoplayAnimFrame) { cancelAnimationFrame(autoplayAnimFrame); autoplayAnimFrame = null }
        autoplayFillEl.style.width = '0%'
        autoplayBtnEl.textContent = 'Autoplay'
        autoplayBtnEl.classList.remove('main')
        presetsEl.querySelectorAll('.presetBtn').forEach(function (b) { b.classList.remove('active') })
        autoplayBpmDisplayEl.style.display = 'none'
        autoplayCountdownEl.textContent = ''
        beatGridEl.innerHTML = ''; beatGridSteps = []
        setStatus('Autoplay stopped.', false)
      }

      autoplayBtnEl.addEventListener('click', function () {
        if (autoplayActive) stopAutoplay()
        else startAutoplay()
      })

      autoplayBarsEl.addEventListener('change', function () {
        if (autoplayActive) buildBeatGrid(getAutoplayBars())
        updateAutoplayBpmDisplay()
        // Live update: if bars changed mid-autoplay, just let the beat counter
        // run against the new target — no need to restart
      })

      autoplayModeEl.addEventListener('change', function () {
        var isTime = autoplayModeEl.value === 'time'
        autoplayTimeLabelEl.style.display = isTime ? '' : 'none'
        autoplayBarsLabelEl.style.display = isTime ? 'none' : ''
        autoplayBpmDisplayEl.style.display = isTime ? 'none' : ''
        if (!isTime) updateAutoplayBpmDisplay()
        if (autoplayActive) { stopAutoplay(); startAutoplay() }
      })

      // ---- Notes ----
      var notesArea = document.getElementById('notesArea')
      var STORAGE_NOTES = 'hydra-live-notes-v1'
      notesArea.value = localStorage.getItem(STORAGE_NOTES) || 'TD Web Render TOP: http://localhost:8080/dist/td-output.html\n'
      notesArea.addEventListener('input', function () {
        localStorage.setItem(STORAGE_NOTES, notesArea.value)
      })

      // ---- Global visual filters (CSS on canvas) ----
      var hueCtrl = document.getElementById('hueCtrl')
      var satCtrl = document.getElementById('satCtrl')
      var brightCtrl = document.getElementById('brightCtrl')
      var contrastCtrl = document.getElementById('contrastCtrl')
      var hueVal = document.getElementById('hueVal')
      var satVal = document.getElementById('satVal')
      var brightVal = document.getElementById('brightVal')
      var contrastVal = document.getElementById('contrastVal')

      function getFilterState () {
        return {
          hue: parseInt(hueCtrl.value, 10),
          sat: parseInt(satCtrl.value, 10),
          bright: parseInt(brightCtrl.value, 10),
          contrast: parseInt(contrastCtrl.value, 10),
          speed: parseFloat(speedCtrlEl.value)
        }
      }

      function applyFilterState (state) {
        if (!state) return
        if (state.hue !== undefined) hueCtrl.value = state.hue
        if (state.sat !== undefined) satCtrl.value = state.sat
        if (state.bright !== undefined) brightCtrl.value = state.bright
        if (state.contrast !== undefined) contrastCtrl.value = state.contrast
        if (state.speed !== undefined) { speedCtrlEl.value = state.speed; updateSpeed() }
        applyFilters()
      }

      function buildFilterString (h, s, b, c) {
        return 'hue-rotate(' + h + 'deg) saturate(' + s + '%) brightness(' + b + '%) contrast(' + c + '%)'
      }

      function broadcastFilters (filterStr) {
        // Send to output window via WebSocket relay
        if (relayWs && relayWs.readyState === 1) {
          relayWs.send(JSON.stringify({ type: 'filters', filter: filterStr }))
        }
        // Also apply directly if output window is open (for instant response)
        if (audienceWindow && !audienceWindow.closed) {
          try {
            var v = audienceWindow.document.getElementById('v') || audienceWindow.document.getElementById('audienceVideo')
            if (v) v.style.filter = filterStr
          } catch (e) {}
        }
      }

      function applyFilters () {
        if (!hydraCanvas) return
        var h = hueCtrl.value
        var s = satCtrl.value
        var b = brightCtrl.value
        var c = contrastCtrl.value
        hueVal.textContent = h
        satVal.textContent = s
        brightVal.textContent = b
        contrastVal.textContent = c
        var filterStr = buildFilterString(h, s, b, c)
        hydraCanvas.style.filter = filterStr
        broadcastFilters(filterStr)
      }

      hueCtrl.addEventListener('input', applyFilters)
      satCtrl.addEventListener('input', applyFilters)
      brightCtrl.addEventListener('input', applyFilters)
      contrastCtrl.addEventListener('input', applyFilters)
      document.getElementById('resetFiltersBtn').addEventListener('click', function () {
        hueCtrl.value = 0; satCtrl.value = 100; brightCtrl.value = 100; contrastCtrl.value = 100
        applyFilters()
        speedCtrlEl.value = 1; updateSpeed()
      })

      // ---- Resolution picker ----
      var resolutionCtrlEl = document.getElementById('resolutionCtrl')
      resolutionCtrlEl.addEventListener('change', function () {
        var val = resolutionCtrlEl.value
        if (val === 'custom') {
          var input = window.prompt('Enter resolution (WxH):', currentResW + 'x' + currentResH)
          if (!input) { resolutionCtrlEl.value = resolutionMode; return }
          var match = input.match(/^(\d+)\s*[x×X]\s*(\d+)$/)
          if (!match) { resolutionCtrlEl.value = resolutionMode; setStatus('Invalid format. Use WxH (e.g. 1920x1200)', true); return }
          var cw = parseInt(match[1], 10), ch = parseInt(match[2], 10)
          if (cw < 100 || ch < 100 || cw > 7680 || ch > 7680) { resolutionCtrlEl.value = resolutionMode; setStatus('Resolution out of range (100–7680).', true); return }
          // Add custom option and select it
          var customVal = cw + 'x' + ch
          var existing = resolutionCtrlEl.querySelector('option[value="' + customVal + '"]')
          if (!existing) {
            var opt = document.createElement('option')
            opt.value = customVal
            opt.textContent = customVal + ' (custom)'
            resolutionCtrlEl.insertBefore(opt, resolutionCtrlEl.querySelector('option[value="custom"]'))
          }
          resolutionCtrlEl.value = customVal
          resolutionMode = customVal
        } else {
          resolutionMode = val
        }
        fitCanvas()
        setStatus('Resolution: ' + currentResW + 'x' + currentResH, false)
      })

      // ---- Speed control ----
      var speedCtrlEl = document.getElementById('speedCtrl')
      var speedValEl = document.getElementById('speedVal')
      function updateSpeed () {
        var v = parseFloat(speedCtrlEl.value)
        speedValEl.textContent = v.toFixed(1)
        if (typeof window.speed !== 'undefined') window.speed = v
      }
      speedCtrlEl.addEventListener('input', updateSpeed)

      // ---- BPM tap tempo ----
      var bpmValEl = document.getElementById('bpmVal')
      var tapTempoBtn = document.getElementById('tapTempoBtn')
      var tapTimes = []
      var tapResetTimer = null
      tapTempoBtn.addEventListener('click', function () {
        var now = performance.now()
        // Reset taps if gap > 2 seconds
        if (tapTimes.length && now - tapTimes[tapTimes.length - 1] > 2000) {
          tapTimes = []
        }
        tapTimes.push(now)
        // Keep last 8 taps
        if (tapTimes.length > 8) tapTimes.shift()
        if (tapTimes.length >= 2) {
          var total = tapTimes[tapTimes.length - 1] - tapTimes[0]
          var avgInterval = total / (tapTimes.length - 1)
          var bpm = Math.round(60000 / avgInterval)
          bpm = Math.max(1, Math.min(999, bpm))
          bpmValEl.textContent = bpm
          if (typeof window.bpm !== 'undefined') window.bpm = bpm
          setStatus('BPM set to ' + bpm, false)
        }
        // Auto-reset after 3s of no taps
        if (tapResetTimer) clearTimeout(tapResetTimer)
        tapResetTimer = setTimeout(function () { tapTimes = [] }, 3000)
      })

      // ---- Ableton Link ----
      var linkBtn = document.getElementById('linkBtn')
      var linkPeersEl = document.getElementById('linkPeers')
      var linkActive = false
      var linkAvailable = false

      function setLinkButtonState () {
        if (!linkAvailable) { linkBtn.style.display = 'none'; linkPeersEl.style.display = 'none'; return }
        linkBtn.style.display = ''
        linkBtn.textContent = linkActive ? 'Link: On' : 'Link'
        if (linkActive) {
          linkBtn.classList.add('main')
        } else {
          linkBtn.classList.remove('main')
          linkPeersEl.style.display = 'none'
        }
      }

      linkBtn.addEventListener('click', function () {
        if (!linkAvailable || !relayWs || relayWs.readyState !== 1) return
        linkActive = !linkActive
        relayWs.send(JSON.stringify({ type: linkActive ? 'link-enable' : 'link-disable' }))
        setLinkButtonState()
        setStatus(linkActive ? 'Ableton Link enabled — syncing BPM.' : 'Ableton Link disabled.', false)
      })

      // Hook into existing WebSocket message handler to process Link data
      var origWsOnMessage = relayWs ? relayWs.onmessage : null
      function handleLinkMessage (event) {
        try {
          var data = JSON.parse(event.data)
          if (data.type === 'link-status') {
            linkAvailable = data.available
            if (data.enabled) linkActive = true
            setLinkButtonState()
            if (data.available && data.bpm) {
              bpmValEl.textContent = Math.round(data.bpm)
            }
            return
          }
          if (data.type === 'link') {
            if (data.enabled === false) {
              linkActive = false
              setLinkButtonState()
              return
            }
            // Update BPM display and Hydra global
            var roundedBpm = Math.round(data.bpm)
            bpmValEl.textContent = roundedBpm
            if (typeof window.bpm !== 'undefined') window.bpm = data.bpm
            // Show peer count
            linkPeersEl.style.display = ''
            linkPeersEl.textContent = data.numPeers + (data.numPeers === 1 ? ' peer' : ' peers')
            // Drive beat-synced autoplay from Link's actual beat position
            if (typeof data.beat === 'number') {
              autoplayOnLinkBeat(data.beat)
            }
            return
          }
        } catch (e) {}
        // Pass non-Link messages to the original handler (if any)
        if (origWsOnMessage) origWsOnMessage(event)
      }

      // Patch WS message handler — need to re-patch after reconnect too
      function patchRelayWs () {
        if (relayWs && relayWs.onmessage !== handleLinkMessage) {
          origWsOnMessage = relayWs.onmessage
          relayWs.onmessage = handleLinkMessage
        }
      }
      patchRelayWs()
      // Re-patch after reconnects by observing the relay WS
      var origConnectRelay = connectRelay
      connectRelay = function () {
        origConnectRelay()
        // After reconnect, re-patch the handler once open
        if (relayWs) {
          var origOpen = relayWs.onopen
          relayWs.onopen = function () {
            if (origOpen) origOpen()
            patchRelayWs()
            // Re-enable link if it was active
            if (linkActive) {
              relayWs.send(JSON.stringify({ type: 'link-enable' }))
            }
          }
        }
      }

      // When tap tempo sets BPM while Link is active, push it to Link
      tapTempoBtn.addEventListener('click', function () {
        if (linkActive && relayWs && relayWs.readyState === 1) {
          var currentBpm = parseInt(bpmValEl.textContent, 10)
          if (currentBpm > 0) {
            relayWs.send(JSON.stringify({ type: 'link-set-bpm', bpm: currentBpm }))
          }
        }
      })

      console.log('[hydra] Init complete. Calling loadPresets()...')
      loadPresets()
      setNdiButtonState()
      startAudio()
      // keep attempting auto-resume for audio-reactive patches
      let audioRetry = 0
      const audioTimer = setInterval(function () {
        audioRetry += 1
        startAudio()
        if (audioRetry > 20) clearInterval(audioTimer)
      }, 1200)
      window.addEventListener('pointerdown', startAudio, { once: true })
      if (hydra) {
        setStatus('Live coding ready. Ctrl/Cmd+Enter line, Alt+Enter block, Ctrl/Cmd+Shift+Enter all.', false)
      }
    })()
  </script>
</body>
</html>
