        // Combined: val * b * c - 0.5 * c + 0.5
        var bc = b * c
        var cOff = -0.5 * c + 0.5  // contrast offset (applied after matrix)

        // Saturation matrix (ITU-R BT.709 luma)
        var lr = 0.2126, lg = 0.7152, lb = 0.0722
        // sat matrix: (1-s)*luma + s*identity
        var sr = (1 - s) * lr, sg = (1 - s) * lg, sb = (1 - s) * lb

        // Hue rotation matrix (rotate in RGB space around gray axis)
        var cosH = Math.cos(hRad), sinH = Math.sin(hRad)
        // Standard hue rotation matrix
        var h00 = cosH + (1 - cosH) / 3
        var h01 = (1 - cosH) / 3 - Math.sqrt(1/3) * sinH
        var h02 = (1 - cosH) / 3 + Math.sqrt(1/3) * sinH
        var h10 = (1 - cosH) / 3 + Math.sqrt(1/3) * sinH
        var h11 = cosH + (1 - cosH) / 3
        var h12 = (1 - cosH) / 3 - Math.sqrt(1/3) * sinH
        var h20 = (1 - cosH) / 3 - Math.sqrt(1/3) * sinH
        var h21 = (1 - cosH) / 3 + Math.sqrt(1/3) * sinH
        var h22 = cosH + (1 - cosH) / 3

        // Combined: hue * saturation, then brightness*contrast scaling
        // saturation matrix
        var s00 = sr + s, s01 = sg,     s02 = sb
        var s10 = sr,     s11 = sg + s,  s12 = sb
        var s20 = sr,     s21 = sg,      s22 = sb + s

        // multiply hue * sat
        var m00 = (h00*s00 + h01*s10 + h02*s20) * bc
        var m01 = (h00*s01 + h01*s11 + h02*s21) * bc
        var m02 = (h00*s02 + h01*s12 + h02*s22) * bc
        var m10 = (h10*s00 + h11*s10 + h12*s20) * bc
        var m11 = (h10*s01 + h11*s11 + h12*s21) * bc
        var m12 = (h10*s02 + h11*s12 + h12*s22) * bc
        var m20 = (h20*s00 + h21*s10 + h22*s20) * bc
        var m21 = (h20*s01 + h21*s11 + h22*s21) * bc
        var m22 = (h20*s02 + h21*s12 + h22*s22) * bc

        return { m00:m00, m01:m01, m02:m02, m10:m10, m11:m11, m12:m12, m20:m20, m21:m21, m22:m22, off: cOff * 255 }
      }

      function applyColorMatrix (pixels, mat) {
        var d = pixels.data
        var off = mat.off
        for (var i = 0, len = d.length; i < len; i += 4) {
          var r = d[i], g = d[i+1], b = d[i+2]
          d[i]   = Math.max(0, Math.min(255, mat.m00*r + mat.m01*g + mat.m02*b + off))
          d[i+1] = Math.max(0, Math.min(255, mat.m10*r + mat.m11*g + mat.m12*b + off))
          d[i+2] = Math.max(0, Math.min(255, mat.m20*r + mat.m21*g + mat.m22*b + off))
        }
      }

      // Apply 3x3 unsharp mask convolution for recording pipeline
      function applySharpenConvolution (imageData, w, h, amount) {
        var k = amount / 50
        var src = new Uint8ClampedArray(imageData.data)
        var dst = imageData.data
        for (var y = 1; y < h - 1; y++) {
          for (var x = 1; x < w - 1; x++) {
            var i = (y * w + x) * 4
            for (var ch = 0; ch < 3; ch++) {
              var idx = i + ch
              var val = src[idx] * (1 + 4*k)
                - k * src[idx - 4]       // left
                - k * src[idx + 4]       // right
                - k * src[idx - w*4]     // top
                - k * src[idx + w*4]     // bottom
              dst[idx] = Math.max(0, Math.min(255, val + 0.5 | 0))
            }
          }
        }
      }

      // Check if filters are at default (no transform needed)
      function filtersAreDefault () {
        return parseInt(hueCtrl.value, 10) === 0 &&
               parseInt(satCtrl.value, 10) === 100 &&
               parseInt(brightCtrl.value, 10) === 100 &&
               parseInt(contrastCtrl.value, 10) === 100 &&
               parseInt(sharpenCtrl.value, 10) === 0
      }

      function captureRawFrame () {
        if (!hydraCanvas || !ensureRecVideoPlaying()) return null
        var w = hydraCanvas.width
        var h = hydraCanvas.height
        if (!recCopyCanvas) {
          recCopyCanvas = document.createElement('canvas')
          recCopyCtx = recCopyCanvas.getContext('2d', { willReadFrequently: true })
        }
        if (recCopyCanvas.width !== w) recCopyCanvas.width = w
        if (recCopyCanvas.height !== h) recCopyCanvas.height = h
        recCopyCtx.drawImage(recVideo, 0, 0, w, h)

        var imageData = recCopyCtx.getImageData(0, 0, w, h)

        // Apply CSS filter effects as pixel math (CSS filters can't be captured via canvas APIs)
        if (!filtersAreDefault()) {
          var mat = buildColorMatrix(
            parseInt(hueCtrl.value, 10),
            parseInt(satCtrl.value, 10),
            parseInt(brightCtrl.value, 10),
            parseInt(contrastCtrl.value, 10)
          )
          applyColorMatrix(imageData, mat)
          var shAmt = parseInt(sharpenCtrl.value, 10)
          if (shAmt > 0) applySharpenConvolution(imageData, w, h, shAmt)
        }

        return imageData.data.buffer
      }

      var recWs = null

      function startRecording (folder) {
        if (!hydraCanvas) { setStatus('No canvas to record', true); return Promise.reject(new Error('No canvas')) }
        // Clear stale state
        clearInterval(recFrameInterval)
        clearInterval(recordTimerInterval)
        recFrameInterval = null
        recordTimerInterval = null
        recordStartTime = null
        if (recWs) { try { recWs.close() } catch (e) {} recWs = null }
        recSessionId = null

        var body = { fps: REC_FPS, width: hydraCanvas.width, height: hydraCanvas.height }
        if (folder) body.folder = folder
        return fetch('/api/recordings/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        }).then(function (r) { return r.json() })
          .then(function (data) {
            if (data.error) { setStatus('Record start failed: ' + data.error, true); return Promise.reject(new Error(data.error)) }
            recSessionId = data.sessionId
            recIsActive = true

            var wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:'
            recWs = new WebSocket(wsProto + '//' + location.host + '/ws/recording/' + recSessionId)
            recWs.binaryType = 'arraybuffer'

            recordStartTime = Date.now()
            recordBtn.classList.add('recording')
            updateRecordTimer()
            recordTimerInterval = setInterval(updateRecordTimer, 1000)
            setStatus('Recording ProRes LT (' + hydraCanvas.width + 'x' + hydraCanvas.height + ' @ ' + REC_FPS + 'fps)...', false)

            var frameMs = 1000 / REC_FPS
            recFrameInterval = setInterval(function () {
              if (!recSessionId || !recWs || recWs.readyState !== 1) return
              var buf = captureRawFrame()
              if (buf) recWs.send(buf)
            }, frameMs)

            return data
          })
      }

      function stopRecording () {
        recIsActive = false
        clearInterval(recFrameInterval)
        clearInterval(recordTimerInterval)
        recFrameInterval = null
        recordBtn.textContent = '● Rec'
        recordBtn.classList.remove('recording')
        recordStartTime = null
        if (recWs) { try { recWs.close() } catch (e) {} recWs = null }

        if (!recSessionId) return Promise.resolve({})
        var sid = recSessionId
        recSessionId = null
        setStatus('Finalizing ProRes LT...', false)
        return fetch('/api/recordings/stop/' + sid, { method: 'POST' })
          .then(function (r) { return r.json() })
          .then(function (data) {
            if (data.error) {
              setStatus('Finalize failed: ' + data.error, true)
            } else {
              var sizeMB = (data.size / (1024 * 1024)).toFixed(1)
              setStatus('Saved: ' + data.saved + ' (' + sizeMB + ' MB ProRes LT)', false)
            }
            return data
          })
      }

      recordBtn.addEventListener('click', function () {
        if (recSessionId) {
          stopRecording()
        } else {
          startRecording()
        }
      })

      // ---- Batch Record All Presets ----
      var batchRecordBtn = document.getElementById('batchRecordBtn')
      var batchRecording = false
      var batchAbort = false

      // Returns a promise that resolves when recording + ffmpeg finalize completes
      function recordClipToServer (durationMs, folder) {
        return startRecording(folder).then(function () {
          return new Promise(function (resolve) { setTimeout(resolve, durationMs) })
        }).then(function () {
          return stopRecording()
        })
      }

      // Helper: load, run, and wait for a single preset by index
      function loadAndRunPreset (entry) {
        return fetch('/api/presets/' + entry.file, { cache: 'no-store' })
          .then(function (r) { return r.json() })
          .then(function (data) {
            var code = parsePresetMarkdown(data.content)
            var filters = parsePresetFilters(data.content)

            // Update tracking
            currentPresetFile = entry.file
            currentPresetName = entry.name || entry.file.replace(/\.md$/, '')
            localStorage.setItem(STORAGE_PRESET_FILE, currentPresetFile)
            localStorage.setItem(STORAGE_PRESET_NAME, currentPresetName)
            highlightActivePreset()

            // Run it
            cleanupSources()
            if (audioBootstrapCode) hydra.eval(audioBootstrapCode)
            hydra.eval(code)
            if (filters) applyFilterState(filters)
          })
      }

      // Helper: wait ms
      function wait (ms) {
        return new Promise(function (resolve) { setTimeout(resolve, ms) })
      }

      async function batchRecordAllPresets () {
        // If already running, abort
        if (batchRecording) {
          batchAbort = true
          setStatus('Batch record: stopping after current clip...', false)
          return
        }

        // Stop autoplay if it's running — it will fight us for preset control
        if (autoplayActive) stopAutoplay()

        // Fetch preset list once upfront
        var presetRes = await fetch('/api/presets', { cache: 'no-store' })
        var presets = await presetRes.json()
        if (!presets.length) { setStatus('No presets found', true); return }

        // Find start index from currently active preset
        var startIdx = 0
        if (currentPresetFile) {
          for (var si = 0; si < presets.length; si++) {
            if (presets[si].file === currentPresetFile) { startIdx = si; break }
          }
        }

        var total = presets.length - startIdx
        var startName = presets[startIdx].name || presets[startIdx].file
        if (!confirm('Batch record ' + total + ' presets starting from "' + startName + '"?')) return

        // Lock state
        batchRecording = true
        batchAbort = false
        batchRecordBtn.textContent = '■ Stop Batch'
        batchRecordBtn.classList.add('recording')

        // Create batch folder
        var bd = new Date()
        var batchFolder = 'batch-' + bd.getFullYear() +
          String(bd.getMonth() + 1).padStart(2, '0') +
          String(bd.getDate()).padStart(2, '0') + '_' +
          String(bd.getHours()).padStart(2, '0') +
          String(bd.getMinutes()).padStart(2, '0') +
          String(bd.getSeconds()).padStart(2, '0')

        var SETTLE_TIME = 3000
        var CLIP_LENGTH = 5200
        var completed = 0

        for (var i = startIdx; i < presets.length; i++) {
          if (batchAbort) break
          var entry = presets[i]
          var label = entry.name || entry.file
          var clipNum = i - startIdx + 1

          // Step 1: Load and run preset
          setStatus('Batch [' + clipNum + '/' + total + '] Loading: ' + label, false)
          try {
            await loadAndRunPreset(entry)
          } catch (err) {
            setStatus('Batch [' + clipNum + '/' + total + '] Load error: ' + err.message, true)
            await wait(1000)
            continue
          }

          // Step 2: Wait for preset to settle
          if (batchAbort) break
          setStatus('Batch [' + clipNum + '/' + total + '] Settling: ' + label, false)
          await wait(SETTLE_TIME)

          // Step 3: Record
          if (batchAbort) break
          setStatus('Batch [' + clipNum + '/' + total + '] Recording: ' + label, false)
          try {
            var result = await recordClipToServer(CLIP_LENGTH, batchFolder)
            if (result && result.saved) {
              completed++
              setStatus('Batch [' + clipNum + '/' + total + '] Saved: ' + result.saved, false)
            }
          } catch (err) {
            setStatus('Batch [' + clipNum + '/' + total + '] Record error: ' + err.message, true)
          }

          // Step 4: Brief pause before next
          await wait(500)
        }

        // Done
        batchRecording = false
        batchAbort = false
        batchRecordBtn.textContent = '● Batch Rec'
        batchRecordBtn.classList.remove('recording')

        if (completed > 0) {
          setStatus('Batch done — ' + completed + ' clips in recordings/' + batchFolder, false)
        } else {
          setStatus('Batch done — no clips saved', true)
        }
      }

      batchRecordBtn.addEventListener('click', function () {
        batchRecordAllPresets()
      })

      // Hydra editor-style shortcuts (from Hydra README)
      window.addEventListener('keydown', function (event) {
        const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0
        const ctrlOrCmd = isMac ? event.metaKey : event.ctrlKey

        if (ctrlOrCmd && !event.shiftKey && event.key === 'Enter') {
          event.preventDefault()
          runLineWithFallback()
          return
        }

        if (ctrlOrCmd && event.shiftKey && event.key === 'Enter') {
          event.preventDefault()
          runAll()
          return
        }

        if (event.altKey && event.key === 'Enter') {
          event.preventDefault()
          cmRunAll()
          return
        }

        if (ctrlOrCmd && event.shiftKey && event.key.toLowerCase() === 'h') {
          event.preventDefault()
          toggleAudienceMode()
          return
        }

        if (ctrlOrCmd && event.shiftKey && event.key.toLowerCase() === 'f') {
          event.preventDefault()
          formatCode()
          return
        }

        if (ctrlOrCmd && !event.shiftKey && event.key.toLowerCase() === 's') {
          event.preventDefault()
          savePreset()
          return
        }

        if (ctrlOrCmd && event.shiftKey && event.key.toLowerCase() === 's') {
          event.preventDefault()
          saveScreenshot()
          return
        }

        if (ctrlOrCmd && event.shiftKey && event.key.toLowerCase() === 'n') {
          event.preventDefault()
          toggleNdiOutput(false)
          return
        }
      })

      window.addEventListener('resize', fitCanvas)
      window.__hydraAttachToOutputWindow = function (targetWindow) {
        return attachOutputStream(targetWindow, { cleanStatus: false })
      }
      window.addEventListener('beforeunload', function () {
        if (outputAttachTimer) clearInterval(outputAttachTimer)
        if (outputStream) {
          outputStream.getTracks().forEach(function (t) { t.stop() })
          outputStream = null
        }
        if (ddActive) ddDisconnect()
      })

      // ---- Autoplay ----
      var autoplayActive = false
      var autoplayTimer = null
      var autoplayIndex = 0
      var autoplayStartTime = 0
      var autoplayAnimFrame = null
      var autoplayPresetList = []
      var autoplayBtnEl = document.getElementById('autoplayBtn')
      var autoplayModeEl = document.getElementById('autoplayMode')
      var autoplaySecondsEl = document.getElementById('autoplaySeconds')
      var autoplayBpmEl = document.getElementById('autoplayBpm')
      var autoplayBarsEl = document.getElementById('autoplayBars')
      var autoplayTimeLabelEl = document.getElementById('autoplayTimeLabel')
      var autoplayBarsLabelEl = document.getElementById('autoplayBarsLabel')
      var autoplayBpmDisplayEl = document.getElementById('autoplayBpmDisplay')
      var autoplayFillEl = document.getElementById('autoplayProgressFill')
      var autoplayCountdownEl = document.getElementById('autoplayCountdown')
      var beatGridEl = document.getElementById('beatGrid')
      var beatGridSteps = []

      function buildBeatGrid (totalBars) {
        beatGridEl.innerHTML = ''
        beatGridSteps = []
        for (var bar = 0; bar < totalBars; bar++) {
          var group = document.createElement('div')
          group.className = 'beat-group'
          for (var b = 0; b < 4; b++) {
            var step = document.createElement('div')
            step.className = 'beat-step'
            group.appendChild(step)
            beatGridSteps.push(step)
          }
          beatGridEl.appendChild(group)
        }
      }

      function updateBeatGrid (completedBeats) {
        for (var i = 0; i < beatGridSteps.length; i++) {
          beatGridSteps[i].classList.toggle('lit', i < completedBeats)
        }
      }

      // Link beat tracking for beat-synced autoplay
      var linkBeat = 0       // absolute beat from Link (updated at ~20Hz)
      var linkStartBeat = 0  // beat when current preset started

      function getCurrentBpm () {
        var liveBpm = parseFloat(bpmValEl.textContent)
        if (liveBpm && liveBpm > 0) return liveBpm
        return Math.max(1, parseInt(autoplayBpmEl.value, 10) || 120)
      }

      function getAutoplayBars () {
        return Math.max(1, parseInt(autoplayBarsEl.value, 10) || 32)
      }

      function getAutoplayDurationMs () {
        if (autoplayModeEl.value === 'bars') {
          var bpm = getCurrentBpm()
          var bars = getAutoplayBars()
          return (bars * 4 / bpm) * 60 * 1000
        }
        return Math.max(1, parseInt(autoplaySecondsEl.value, 10) || 120) * 1000
      }

      function updateAutoplayBpmDisplay () {
        if (autoplayModeEl.value !== 'bars') return
        var bpm = getCurrentBpm()
        var bars = getAutoplayBars()
        var dur = (bars * 4 / bpm) * 60
        autoplayBpmDisplayEl.textContent = bpm + ' BPM \u2022 ' + dur.toFixed(1) + 's'
      }

      function autoplayLoadPreset (index) {
        if (!autoplayPresetList.length) return
        if (recIsActive || batchRecording) return // never change presets during recording
        autoplayIndex = index % autoplayPresetList.length
        var entry = autoplayPresetList[autoplayIndex]
        presetsEl.querySelectorAll('.presetBtn').forEach(function (b, i) {
          b.classList.toggle('active', i === autoplayIndex)
        })
        fetch('/api/presets/' + entry.file, { cache: 'no-store' })
          .then(function (r) { return r.json() })
          .then(function (data) {
            editorEl.value = parsePresetMarkdown(data.content)
            localStorage.setItem(STORAGE_EDITOR, editorEl.value)
            pendingFilters = parsePresetFilters(data.content)
            runCode(editorEl.value, 'autoplay: ' + (entry.name || entry.file))
          })
          .catch(function (err) { setStatus('Autoplay load failed: ' + err.message, true) })
      }

      // Called from Link message handler — drives beat-synced transitions
      function autoplayOnLinkBeat (beat) {
        linkBeat = beat
        if (!autoplayActive || autoplayModeEl.value !== 'bars') return
        if (batchRecording) return // don't change presets during batch recording
        var totalBars = getAutoplayBars()
        var totalBeats = totalBars * 4
        var elapsed = beat - linkStartBeat
        // Discrete beat-step display — no smooth interpolation
        var completedBeats = Math.floor(elapsed)
        var currentBar = Math.floor(completedBeats / 4) + 1
        var currentBeat = (completedBeats % 4) + 1
        updateBeatGrid(completedBeats)
        autoplayCountdownEl.textContent = 'Bar ' + Math.min(currentBar, totalBars) + '/' + totalBars + ' beat ' + currentBeat
        updateAutoplayBpmDisplay()
        // Transition on bar boundary
        if (elapsed >= totalBeats) {
          // Cancel the fallback timer so we don't double-fire
          if (autoplayTimer) { clearTimeout(autoplayTimer); autoplayTimer = null }
          if (autoplayAnimFrame) { cancelAnimationFrame(autoplayAnimFrame); autoplayAnimFrame = null }
          linkStartBeat = beat
          autoplayLoadPreset(autoplayIndex + 1)
          // Restart fallback timer for next cycle
          autoplayScheduleBars()
        }
      }

      function autoplayScheduleTime () {
        // Time-based mode: use setTimeout + rAF for countdown
        var duration = getAutoplayDurationMs()
        autoplayStartTime = Date.now()
        if (autoplayTimer) clearTimeout(autoplayTimer)
        autoplayTimer = setTimeout(function () {
          if (!autoplayActive) return
          autoplayLoadPreset(autoplayIndex + 1)
          if (autoplayActive) autoplayScheduleTime()
        }, duration)
        if (autoplayAnimFrame) cancelAnimationFrame(autoplayAnimFrame)
        function tick () {
          if (!autoplayActive) return
          var elapsed = Date.now() - autoplayStartTime
          var pct = Math.min(100, (elapsed / duration) * 100)
          autoplayFillEl.style.width = pct + '%'
          var remaining = Math.max(0, Math.ceil((duration - elapsed) / 1000))
          autoplayCountdownEl.textContent = remaining + 's'
          autoplayAnimFrame = requestAnimationFrame(tick)
        }
        tick()
      }

      // Bars mode: always runs a setTimeout + rAF as baseline.
      // When Link is active, autoplayOnLinkBeat overrides the display
      // and fires transitions on real beat boundaries.
      function autoplayScheduleBars () {
        var duration = getAutoplayDurationMs()
        autoplayStartTime = Date.now()
        updateAutoplayBpmDisplay()
        if (autoplayTimer) clearTimeout(autoplayTimer)
        autoplayTimer = setTimeout(function () {
          if (!autoplayActive) return
          autoplayLoadPreset(autoplayIndex + 1)
          if (autoplayActive) autoplayScheduleBars()
        }, duration)
        var totalBars = getAutoplayBars()
        if (autoplayAnimFrame) cancelAnimationFrame(autoplayAnimFrame)
        function tick () {
          if (!autoplayActive) return
          var elapsed = Date.now() - autoplayStartTime
          var bpm = getCurrentBpm()
          var msPerBeat = 60000 / bpm
          var elapsedBeats = elapsed / msPerBeat
          var totalBeats = totalBars * 4
          var completedBeats = Math.floor(elapsedBeats)
          updateBeatGrid(completedBeats)
          var currentBar = Math.floor(completedBeats / 4) + 1
          var currentBeat = (completedBeats % 4) + 1
          autoplayCountdownEl.textContent = 'Bar ' + Math.min(currentBar, totalBars) + '/' + totalBars + ' beat ' + currentBeat
          autoplayAnimFrame = requestAnimationFrame(tick)
        }
        tick()
      }

      function startAutoplay () {
        autoplayPresetList = []
        presetsEl.querySelectorAll('.presetBtn').forEach(function (btn, i) {
          autoplayPresetList.push({ name: btn.textContent, file: btn.dataset.file || btn.title })
        })
        if (!autoplayPresetList.length) {
          setStatus('No presets to autoplay.', true)
          return
        }
        autoplayActive = true
        autoplayIndex = 0
        if (currentPresetFile) {
          for (var i = 0; i < autoplayPresetList.length; i++) {
            if (autoplayPresetList[i].file === currentPresetFile) { autoplayIndex = i; break }
          }
        }
        autoplayBtnEl.textContent = 'Stop'
        autoplayBtnEl.classList.add('main')
        autoplayLoadPreset(0)

        if (autoplayModeEl.value === 'bars') {
          buildBeatGrid(getAutoplayBars())
          linkStartBeat = linkBeat
          if (linkActive) {
            // Beat-driven: Link handler does the work, but also start
            // the timer as fallback in case Link messages stop
            updateAutoplayBpmDisplay()
          }
          autoplayScheduleBars()
        } else {
          autoplayScheduleTime()
        }
      }

      function stopAutoplay () {
        autoplayActive = false
        if (autoplayTimer) { clearTimeout(autoplayTimer); autoplayTimer = null }
        if (autoplayAnimFrame) { cancelAnimationFrame(autoplayAnimFrame); autoplayAnimFrame = null }
        autoplayFillEl.style.width = '0%'
        autoplayBtnEl.textContent = 'Autoplay'
        autoplayBtnEl.classList.remove('main')
        presetsEl.querySelectorAll('.presetBtn').forEach(function (b) { b.classList.remove('active') })
        autoplayBpmDisplayEl.style.display = 'none'
        autoplayCountdownEl.textContent = ''
        beatGridEl.innerHTML = ''; beatGridSteps = []
        setStatus('Autoplay stopped.', false)
      }

      autoplayBtnEl.addEventListener('click', function () {
        if (autoplayActive) stopAutoplay()
        else startAutoplay()
      })

      autoplayBarsEl.addEventListener('change', function () {
        if (autoplayActive) buildBeatGrid(getAutoplayBars())
        updateAutoplayBpmDisplay()
        // Live update: if bars changed mid-autoplay, just let the beat counter
        // run against the new target — no need to restart
      })

      autoplayModeEl.addEventListener('change', function () {
        var isTime = autoplayModeEl.value === 'time'
        autoplayTimeLabelEl.style.display = isTime ? '' : 'none'
        autoplayBarsLabelEl.style.display = isTime ? 'none' : ''
        autoplayBpmDisplayEl.style.display = isTime ? 'none' : ''
        if (!isTime) updateAutoplayBpmDisplay()
        if (autoplayActive) { stopAutoplay(); startAutoplay() }
      })

      // ---- Daydream AI Integration ----
      var ddBar = document.getElementById('daydreamBar')

      // ---- Pipeline + LoRA dropdowns ----

      var ddLoraSelect = document.getElementById('ddLoraSelect')
      var ddPreprocessorSelect = document.getElementById('ddPreprocessor')
      var ddPostprocessorSelect = document.getElementById('ddPostprocessor')
      var ddLoadPipelineBtn = document.getElementById('ddLoadPipeline')

      function ddFetchPipelinesAndLoras () {
        // Known Scope pipelines — the API only returns locally-installed ones,
        // but Scope UI shows all built-in pipelines. Hardcode the registry.
        var knownMain = [
          { id: 'krea-realtime-video', name: 'Krea Realtime Video' },
          { id: 'streamdiffusionv2', name: 'StreamDiffusionV2' },
          { id: 'longlive', name: 'LongLive' },

          { id: 'memflow', name: 'MemFlow' },
          { id: 'passthrough', name: 'Passthrough' }
        ]
        var knownPre = [
          { id: 'scribble', name: 'Scribble' },
          { id: 'gray', name: 'Grayscale' },
          { id: 'optical-flow', name: 'Optical Flow' },
          { id: 'video-depth-anything', name: 'Video Depth Anything' }
        ]
        var knownPost = [
          { id: 'rife', name: 'RIFE' }
        ]

        ddPipelineSelect.innerHTML = ''
        knownMain.forEach(function (p) {

          opt.value = p.id

          ddPipelineSelect.appendChild(opt)
        })

        ddPreprocessorSelect.innerHTML = '<option value="">No Preprocessor</option>'

        })

        knownPost.forEach(function (p) {

        // Also fetch from API to add any custom/new pipelines not in our list
        fetch('/api/scope/api/v1/pipelines/schemas').then(function (r) { return r.json() }).then(function (data) {
          var pipelines = data.pipelines || data
          var knownIds = knownMain.concat(knownPre).concat(knownPost).map(function (p) { return p.id })
          Object.keys(pipelines).forEach(function (pid) {

            var p = pipelines[pid]

        // Fetch installed LoRAs
        fetch('/api/scope/api/v1/loras').then(function (r) { return r.json() }).then(function (data) {

      }

      // Build pipeline load payload from current dropdown selections
      function ddBuildPipelinePayload () {
        var pipelineId = ddPipelineSelect.value
        var loraPath = ddLoraSelect.value
        var preProc = ddPreprocessorSelect.value
        var postProc = ddPostprocessorSelect.value
        var pipelineIds = []
        if (preProc) pipelineIds.push(preProc)
        pipelineIds.push(pipelineId)
        if (postProc) pipelineIds.push(postProc)
        var loadParams = { width: 576, height: 320, vace_enabled: true, vace_context_scale: 1 }
        if (loraPath) {
          loadParams.loras = [{ path: loraPath, scale: 1.0 }]
        } else {
          loadParams.loras = []
        }
        var label = pipelineId
        if (preProc) label = preProc + ' → ' + label
        if (postProc) label += ' → ' + postProc
        if (loraPath) label += ' + LoRA'
        return { pipeline_ids: pipelineIds, load_params: loadParams, label: label }
      }

      // Load pipeline and return a promise that resolves when status is "loaded"
      function ddLoadPipeline () {
        var payload = ddBuildPipelinePayload()
        ddLog('Loading pipeline: ' + payload.label)
        ddLog('  pipeline_ids: ' + JSON.stringify(payload.pipeline_ids))
        ddLog('  load_params: ' + JSON.stringify(payload.load_params))
        ddLoadPipelineBtn.textContent = 'Loading...'
        ddLoadPipelineBtn.disabled = true
        ddInfo.textContent = 'Loading ' + payload.label + '...'
        return fetch('/api/scope/api/v1/pipeline/load', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pipeline_ids: payload.pipeline_ids, load_params: payload.load_params })
        }).then(function (r) {
          ddLog('Pipeline load response: HTTP ' + r.status)
          return r.json()
        }).then(function (d) {
          ddLog('Pipeline load accepted: ' + JSON.stringify(d), 'ok')
          // Poll pipeline status until loaded (or error/timeout)
          return ddPollPipelineStatus()
        }).then(function () {
          ddLoadPipelineBtn.textContent = 'Load'
          ddLoadPipelineBtn.disabled = false
        }).catch(function (err) {
          ddLog('Pipeline load FAILED: ' + err.message, 'err')
          ddLoadPipelineBtn.textContent = 'Load'
          ddLoadPipelineBtn.disabled = false
          ddInfo.textContent = 'Load error: ' + err.message
          throw err
        })
      }

      // Poll /api/v1/pipeline/status until loaded, error, or timeout
      function ddPollPipelineStatus () {
        var maxPolls = 300 // 5 minutes max — model loading on remote GPU can be slow
        var pollCount = 0
        var lastStage = ''
        return new Promise(function (resolve, reject) {
          function poll () {
            pollCount++
            fetch('/api/scope/api/v1/pipeline/status').then(function (r) { return r.json() }).then(function (ps) {
              var status = ps.status || 'unknown'
              var stage = ps.loading_stage || ''
              // Log when stage changes, or every 10s
              if (stage !== lastStage) {
                ddLog('Pipeline: ' + status + (stage ? ' — ' + stage : ''), 'warn')
                ddSetState('connecting', stage || ('Loading pipeline... (' + pollCount + 's)'))
                lastStage = stage
              } else if (pollCount % 10 === 0) {
                ddLog('Pipeline: still ' + status + (stage ? ' — ' + stage : '') + ' (' + pollCount + 's)')
                ddSetState('connecting', (stage || 'Loading pipeline') + '... (' + pollCount + 's)')
              }
              if (status === 'loaded') {
                ddLog('Pipeline LOADED' + (ps.pipeline_id ? ' (' + ps.pipeline_id + ')' : ''), 'ok')
                ddInfo.textContent = 'Pipeline loaded'
                resolve()
              } else if (status === 'error') {
                ddLog('Pipeline ERROR: ' + (ps.error || JSON.stringify(ps)), 'err')
                reject(new Error('Pipeline load error: ' + (ps.error || 'unknown')))
              } else if (pollCount >= maxPolls) {
                ddLog('Pipeline load TIMEOUT after ' + Math.round(maxPolls / 60) + ' min', 'err')
                reject(new Error('Pipeline load timeout'))
              } else {
                setTimeout(poll, 1000)
              }
            }).catch(function (err) {
              // Cloud proxy timeouts are normal during model loading — keep polling
              if (pollCount % 5 === 0) {
                ddLog('Pipeline status poll error: ' + err.message + ' (cloud may be busy, retrying...)', 'warn')
              }
              setTimeout(poll, 2000) // slower retry on errors
            })
          }
          poll()
        })
      }

      ddLoadPipelineBtn.addEventListener('click', function () {

      function ddShowScope () {

      var ddHealthRetries = 0

      function ddSetState (state, msg) {
        ddDot.className = 'dd-dot' + (state === 'on' ? ' on' : state === 'err' ? ' err' : state === 'connecting' ? ' connecting' : '')
        ddInfo.textContent = msg || ''
        if (state === 'on') {

      function ddGetCanvasStream () {
        if (!hydraCanvas || !hydraCanvas.captureStream) return null
        if (!ddCanvasStream) ddCanvasStream = hydraCanvas.captureStream(30)
        return ddCanvasStream
      }

      // Wait for ICE gathering to complete
      function ddWaitGather (pc) {
        return new Promise(function (resolve) {
          if (pc.iceGatheringState === 'complete') return resolve()
          pc.addEventListener('icegatheringstatechange', function fn () {
            if (pc.iceGatheringState === 'complete') {
              pc.removeEventListener('icegatheringstatechange', fn)
              resolve()
            }
          })
        })
      }

      // WHIP: send canvas to Daydream
      var ddWhepUrlFromWhip = null
      function ddStartWhip (whipUrl) {
        var stream = ddGetCanvasStream()
        if (!stream) { ddSetState('err', 'No canvas stream'); return Promise.reject() }
        ddWhipPc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] })
        stream.getTracks().forEach(function (t) { ddWhipPc.addTrack(t, stream) })
        return ddWhipPc.createOffer().then(function (offer) {
          return ddWhipPc.setLocalDescription(offer)
        }).then(function () {
          return ddWaitGather(ddWhipPc)
        }).then(function () {
          console.log('Daydream WHIP: posting to', whipUrl)
          return fetch(whipUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/sdp' },
            body: ddWhipPc.localDescription.sdp
          })
        }).then(function (r) {
          // Capture playback URL from response headers
          ddWhepUrlFromWhip = r.headers.get('livepeer-playback-url') || r.headers.get('location')
          console.log('Daydream WHIP response:', r.status, 'playback header:', ddWhepUrlFromWhip)
          // Log all headers for debugging
          r.headers.forEach(function (v, k) { console.log('  WHIP header:', k, '=', v) })
          if (!r.ok) throw new Error('WHIP ' + r.status)
          return r.text()
        }).then(function (sdp) {
          console.log('Daydream WHIP: got SDP answer, length=', sdp.length)
          return ddWhipPc.setRemoteDescription({ type: 'answer', sdp: sdp })
        })
      }

      // WHEP: receive AI output from Daydream
      function ddStartWhep (whepUrl) {
        console.log('Daydream WHEP: connecting to', whepUrl)
        ddWhepPc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] })
        ddWhepPc.addTransceiver('video', { direction: 'recvonly' })
        ddWhepPc.ontrack = function (e) {
          console.log('Daydream WHEP: got track!', e.track.kind)
          if (!ddVideo) {
            ddVideo = document.createElement('video')
            ddVideo.autoplay = true
            ddVideo.playsInline = true
            ddVideo.muted = true
            ddVideo.style.display = 'none'
            document.body.appendChild(ddVideo)
          }
          ddVideo.srcObject = e.streams[0] || new MediaStream([e.track])
          ddVideo.play().catch(function (err) { console.warn('Daydream video play failed:', err) })
          // Monitor video state
          ddVideo.onloadedmetadata = function () { console.log('Daydream video: metadata loaded', ddVideo.videoWidth, 'x', ddVideo.videoHeight) }
          ddVideo.onplaying = function () { console.log('Daydream video: playing') }
          ddVideo.onstalled = function () { console.log('Daydream video: stalled') }
          // Wire into hydra as s0 — wait for video dimensions then use init()
          function ddWireS0 () {
            if (typeof s0 === 'undefined' || !s0.init) {
              ddSetState('on', 'Receiving (s0 not ready)')
              return
            }
            if (ddVideo.videoWidth > 0) {
              s0.init({ src: ddVideo, dynamic: true })
              ddSetState('on', 'src(s0) = AI feed (' + ddVideo.videoWidth + 'x' + ddVideo.videoHeight + ')')
              console.log('Daydream: wired to s0', ddVideo.videoWidth, 'x', ddVideo.videoHeight)
            } else {
              // Video dimensions not ready yet, retry
              console.log('Daydream: waiting for video dimensions...')
              setTimeout(ddWireS0, 200)
            }
          }
          ddWireS0()
          // Debug: show video in corner so we can see if frames arrive
          ddVideo.style.display = 'block'
          ddVideo.style.position = 'fixed'
          ddVideo.style.bottom = '10px'
          ddVideo.style.left = '10px'
          ddVideo.style.width = '384px'
          ddVideo.style.height = '216px'
          ddVideo.style.zIndex = '9999'
          ddVideo.style.border = 'none'
          ddVideo.style.borderRadius = '4px'
          ddVideo.style.background = '#000'
        }
        ddWhepPc.onconnectionstatechange = function () {
          console.log('Daydream WHEP connection state:', ddWhepPc.connectionState)
        }
        return ddWhepPc.createOffer().then(function (offer) {
          return ddWhepPc.setLocalDescription(offer)
        }).then(function () {
          return ddWaitGather(ddWhepPc)
        }).then(function () {
          console.log('Daydream WHEP: posting SDP offer')
          return fetch(whepUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/sdp' },
            body: ddWhepPc.localDescription.sdp
          })
        }).then(function (r) {
          console.log('Daydream WHEP response:', r.status)
          r.headers.forEach(function (v, k) { console.log('  WHEP header:', k, '=', v) })
          if (!r.ok) return r.text().then(function (t) { throw new Error('WHEP ' + r.status + ': ' + t.substring(0, 200)) })
          return r.text()
        }).then(function (sdp) {
          console.log('Daydream WHEP: got SDP answer, length=', sdp.length)
          return ddWhepPc.setRemoteDescription({ type: 'answer', sdp: sdp })
        })
      }

      // ---- Scope WebRTC (bidirectional: send canvas + receive AI output) ----
      function ddConnectScope () {
        if (ddActive) return
        ddLogStartTime = Date.now()
        ddLogEl.innerHTML = ''
        ddLog('Starting Scope connection sequence...')
        ddSetState('connecting', 'Connecting to Scope...')
        var prompt = ddPromptEl.value || 'abstract fluid art'
        ddLog('Prompt: "' + prompt + '"')

        // Check pipeline status — wait if loading, prompt user if not loaded
        ddLog('Checking pipeline status...')
        fetch('/api/scope/api/v1/pipeline/status').then(function (r) { return r.json() }).then(function (ps) {
          var status = ps.status || 'unknown'
          ddLog('Pipeline: ' + status + (ps.pipeline_id ? ' (' + ps.pipeline_id + ')' : ''), status === 'loaded' ? 'ok' : 'warn')
          if (status === 'loaded') return Promise.resolve()
          if (status === 'loading') {
            ddLog('Pipeline loading — waiting...', 'warn')
            ddSetState('connecting', 'Waiting for pipeline...')
            return ddPollPipelineStatus()
          }
          // Not loaded — tell user to load from Scope UI
          ddLog('No pipeline loaded — load one from Scope UI (localhost:8000)', 'warn')
          ddSetState('connecting', 'Waiting for pipeline — load in Scope UI...')
          return ddPollPipelineStatus()
        }).catch(function () {
          ddLog('Pipeline status unavailable — waiting...', 'warn')
          ddSetState('connecting', 'Waiting for Scope...')
          return ddPollPipelineStatus()
        }).then(function () {
          ddLog('Pipeline ready — starting frame polling', 'ok')
          ddStartFramePolling()
        }).catch(function (err) {
          ddLog('CONNECTION FAILED: ' + (err.message || err), 'err')
          ddSetState('err', err.message || 'Connection failed')
          ddDisconnect()
        })
      }

      // ---- NDI/Camera capture: grab Scope's NDI output as a camera source ----
      var ddFramePollTimer = null
      var ddNdiStream = null

      function ddStartFramePolling () {
        ddLog('Looking for NDI Virtual Camera (Scope NDI output)...')
        ddActive = true

        navigator.mediaDevices.enumerateDevices().then(function (devices) {
          var videoDevices = devices.filter(function (d) { return d.kind === 'videoinput' })
          ddLog('Video devices found: ' + videoDevices.length)
          videoDevices.forEach(function (d) { ddLog('  • ' + (d.label || d.deviceId)) })
          var ndiDevice = videoDevices.find(function (d) { return d.label.toLowerCase().indexOf('ndi') !== -1 })
          var constraints = {
            video: ndiDevice
              ? { deviceId: { exact: ndiDevice.deviceId }, width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 60 } }
              : { width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 60 } }
          }
          if (ndiDevice) {
            ddLog('Found: ' + ndiDevice.label, 'ok')
          } else {
            ddLog('No NDI device — using default camera', 'warn')
          }
          return navigator.mediaDevices.getUserMedia(constraints)
        }).then(function (stream) {
          ddNdiStream = stream
          var track = stream.getVideoTracks()[0]
          var settings = track.getSettings()
          ddLog('Capturing: ' + (settings.width || '?') + 'x' + (settings.height || '?') + ' (' + track.label + ')', 'ok')

          if (!ddVideo) {
            ddVideo = document.createElement('video')
            ddVideo.autoplay = true
            ddVideo.playsInline = true
            ddVideo.muted = true
            ddVideo.style.display = 'none'
            document.body.appendChild(ddVideo)
          }
          ddVideo.srcObject = stream
          ddVideo.play()

          // Canvas intermediary — only update on new video frames
          var ddCanvas = document.createElement('canvas')
          var ddCtx = ddCanvas.getContext('2d', { willReadFrequently: false })
          ddCanvas._newFrame = false

          function ddOnVideoFrame () {
            if (ddCanvas.width !== ddVideo.videoWidth) { ddCanvas.width = ddVideo.videoWidth; ddCanvas.height = ddVideo.videoHeight }
            ddCtx.drawImage(ddVideo, 0, 0)
            ddCanvas._newFrame = true
            ddVideo.requestVideoFrameCallback(ddOnVideoFrame)
          }

          function wireS0 () {
            if (typeof s0 !== 'undefined' && s0.init && ddVideo.videoWidth > 0) {
              ddCanvas.width = ddVideo.videoWidth; ddCanvas.height = ddVideo.videoHeight
              ddCtx.drawImage(ddVideo, 0, 0)
              ddCanvas._newFrame = true
              s0.init({ src: ddCanvas, dynamic: true })
              ddLog('Wired to s0 — ' + ddVideo.videoWidth + 'x' + ddVideo.videoHeight, 'ok')
              ddSetState('on', 'src(s0) = NDI (' + ddVideo.videoWidth + 'x' + ddVideo.videoHeight + ')')
              if (ddVideo.requestVideoFrameCallback) {
                ddVideo.requestVideoFrameCallback(ddOnVideoFrame)
              }
            } else {
              setTimeout(wireS0, 200)
            }
          }
          wireS0()
        }).catch(function (err) {
          ddLog('Camera failed: ' + err.message, 'err')
          ddLog('Make sure NDI Virtual Input app is running', 'warn')
          ddSetState('err', 'NDI capture failed')
          ddActive = false
        })
      }

      function ddConnectScopeWebRTC (prompt) {
        // Step 1: Get ICE servers
        ddLog('Step 1: Fetching ICE servers from /api/scope/api/v1/webrtc/ice-servers')
        return fetch('/api/scope/api/v1/webrtc/ice-servers').then(function (r) {
          ddLog('ICE servers response: HTTP ' + r.status)
          return r.json()
        }).then(function (iceData) {
          var iceServers = iceData.iceServers || [{ urls: 'stun:stun.l.google.com:19302' }]
          ddLog('ICE servers: ' + JSON.stringify(iceServers), 'ok')

          // Step 2: Create RTCPeerConnection
          ddLog('Step 2: Creating RTCPeerConnection')
          ddScopePc = new RTCPeerConnection({ iceServers: iceServers })

          // Add canvas stream tracks (send to Scope)
          var stream = ddGetCanvasStream()
          if (stream) {
            var tracks = stream.getTracks()
            ddLog('Canvas stream: ' + tracks.length + ' track(s) — ' + tracks.map(function (t) { return t.kind + ' ' + t.readyState }).join(', '), 'ok')
            tracks.forEach(function (t) {
              ddScopePc.addTrack(t, stream)

          } else {
            ddLog('WARNING: No canvas stream — Scope will have no input video', 'warn')
          }

          ddScopeDataChannel = ddScopePc.createDataChannel('parameters', { ordered: true })

            ddLog('Data channel OPEN — sending initial prompt', 'ok')
            ddScopeDataChannel.send(JSON.stringify({
              prompts: [{ text: prompt, weight: 1.0 }]
            }))
          }
          ddScopeDataChannel.onerror = function (e) {
            ddLog('Data channel ERROR: ' + (e.error ? e.error.message : 'unknown'), 'err')
          }
          ddScopeDataChannel.onclose = function () {
            ddLog('Data channel closed', 'warn')
          }

          // Handle incoming AI video track
          ddScopePc.ontrack = function (e) {
            ddLog('Step 6: Track received — kind=' + e.track.kind + ' readyState=' + e.track.readyState, 'ok')
            if (e.track.kind !== 'video') {
              ddLog('Ignoring non-video track', 'warn')
              return
            }
            if (!ddVideo) {
              ddVideo = document.createElement('video')
              ddVideo.autoplay = true
              ddVideo.playsInline = true
              ddVideo.muted = true
              ddVideo.style.display = 'none'
              document.body.appendChild(ddVideo)
              ddLog('Created <video> element')
            }
            ddVideo.srcObject = e.streams[0] || new MediaStream([e.track])
            ddLog('Set video srcObject (streams=' + e.streams.length + ')')
            ddVideo.play().then(function () {
              ddLog('Video play() succeeded', 'ok')
            }).catch(function (err) {
              ddLog('Video play() FAILED: ' + err.message, 'err')
            })

            // Monitor video events
            ddVideo.onloadedmetadata = function () {
              ddLog('Video metadata loaded: ' + ddVideo.videoWidth + 'x' + ddVideo.videoHeight, 'ok')
            }
            ddVideo.onstalled = function () { ddLog('Video STALLED', 'warn') }
            ddVideo.onwaiting = function () { ddLog('Video waiting for data...', 'warn') }
            ddVideo.onerror = function () { ddLog('Video element ERROR: ' + (ddVideo.error ? ddVideo.error.message : 'unknown'), 'err') }

            // Track mute/unmute
            e.track.onmute = function () { ddLog('Video track MUTED (no frames arriving)', 'warn') }
            e.track.onunmute = function () {
              ddLog('Video track UNMUTED (frames arriving)', 'ok')
              // Log codec info
              if (ddScopePc) {
                ddScopePc.getReceivers().forEach(function (r) {
                  if (r.track && r.track.kind === 'video') {
                    var params = r.getParameters()
                    var codecs = params.codecs || []
                    ddLog('Recv codec: ' + codecs.map(function (c) { return c.mimeType + ' pt=' + c.payloadType }).join(', '))
                  }
                })
              }
            }
            e.track.onended = function () { ddLog('Video track ENDED', 'err') }

            // Wire into s0
            var wireAttempts = 0
            function ddWireS0Scope () {
              wireAttempts++
              if (typeof s0 !== 'undefined' && s0.init && ddVideo.videoWidth > 0) {
                s0.init({ src: ddVideo, dynamic: true })
                ddLog('Step 7: Wired to s0 — ' + ddVideo.videoWidth + 'x' + ddVideo.videoHeight + ' (attempt ' + wireAttempts + ')', 'ok')
                ddSetState('on', 'src(s0) = Scope (' + ddVideo.videoWidth + 'x' + ddVideo.videoHeight + ')')
              } else {
                var reason = typeof s0 === 'undefined' ? 's0 undefined' : !s0.init ? 's0.init missing' : 'videoWidth=0'
                if (wireAttempts <= 3 || wireAttempts % 10 === 0) {
                  ddLog('Waiting to wire s0... (' + reason + ', attempt ' + wireAttempts + ')', 'warn')
                }
                if (wireAttempts > 50) {
                  ddLog('GAVE UP wiring s0 after 50 attempts (~10s). ' + reason, 'err')
                  ddSetState('err', 'Video received but s0 wire failed: ' + reason)
                  return
                }
                setTimeout(ddWireS0Scope, 200)
              }
            }
            ddWireS0Scope()
          }

          ddScopePc.onconnectionstatechange = function () {
            var state = ddScopePc.connectionState
            var level = state === 'connected' ? 'ok' : state === 'failed' || state === 'disconnected' ? 'err' : 'info'
            ddLog('WebRTC connection: ' + state, level)
            if (state === 'failed') {
              ddSetState('err', 'Scope WebRTC connection failed')
            }
          }

          ddScopePc.oniceconnectionstatechange = function () {
            ddLog('ICE connection: ' + ddScopePc.iceConnectionState)
          }

          ddScopePc.onicegatheringstatechange = function () {
            ddLog('ICE gathering: ' + ddScopePc.iceGatheringState)
          }

          ddScopePc.onsignalingstatechange = function () {
            ddLog('Signaling: ' + ddScopePc.signalingState)
          }

          // Trickle ICE: send candidates as they arrive
          var queuedCandidates = []
          var iceCandidateCount = 0
          ddScopePc.onicecandidate = function (e) {
            if (!e.candidate) {
              ddLog('ICE gathering complete (' + iceCandidateCount + ' candidates)')
              return
            }
            iceCandidateCount++
            if (iceCandidateCount <= 3) {
              ddLog('ICE candidate #' + iceCandidateCount + ': ' + e.candidate.candidate.substring(0, 60) + '...')
            }
            if (ddScopeSessionId) {
              fetch('/api/scope/api/v1/webrtc/offer/' + ddScopeSessionId, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ candidates: [{ candidate: e.candidate.candidate, sdpMid: e.candidate.sdpMid, sdpMLineIndex: e.candidate.sdpMLineIndex }] })
              }).catch(function (err) { ddLog('ICE candidate send FAILED: ' + err.message, 'err') })
            } else {
              queuedCandidates.push(e.candidate)
            }
          }

          // Step 3: Create and send offer
          ddLog('Step 3: Creating WebRTC offer...')
          ddSetState('connecting', 'Creating WebRTC offer...')
          return ddScopePc.createOffer().then(function (offer) {
            ddLog('Offer created (SDP ' + offer.sdp.length + ' bytes)')
            return ddScopePc.setLocalDescription(offer)
          }).then(function () {
            ddLog('Step 4: Sending offer to Scope server...')
            ddSetState('connecting', 'Sending offer to Scope...')
            return fetch('/api/scope/api/v1/webrtc/offer', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                sdp: ddScopePc.localDescription.sdp,
                type: ddScopePc.localDescription.type,

          }).then(function (answer) {
            ddLog('Step 5: Got answer — sessionId=' + answer.sessionId + ', type=' + answer.type, 'ok')
            if (!answer.sdp) ddLog('WARNING: answer has no SDP!', 'err')
            ddScopeSessionId = answer.sessionId
            ddActive = true
            return ddScopePc.setRemoteDescription({ type: answer.type, sdp: answer.sdp })
          }).then(function () {
            ddLog('Remote description set', 'ok')
            // Flush queued ICE candidates
            if (queuedCandidates.length && ddScopeSessionId) {
              ddLog('Flushing ' + queuedCandidates.length + ' queued ICE candidates')
              return fetch('/api/scope/api/v1/webrtc/offer/' + ddScopeSessionId, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ candidates: queuedCandidates.map(function (c) {
                  return { candidate: c.candidate, sdpMid: c.sdpMid, sdpMLineIndex: c.sdpMLineIndex }
                }) })

            }
          }).then(function () {
            ddLog('Scope connected — waiting for video track...', 'ok')
            ddSetState('on', 'Scope connected — waiting for video...')
            // Start a watchdog: if no track in 10s, warn
            setTimeout(function () {
              if (!ddVideo || ddVideo.videoWidth === 0) {
                ddLog('WATCHDOG: No video received after 10s', 'err')
                ddLog('  PC connection: ' + (ddScopePc ? ddScopePc.connectionState : 'null'))
                ddLog('  ICE connection: ' + (ddScopePc ? ddScopePc.iceConnectionState : 'null'))
                ddLog('  Data channel: ' + (ddScopeDataChannel ? ddScopeDataChannel.readyState : 'null'))
                ddLog('  Video element: ' + (ddVideo ? 'exists, ' + ddVideo.videoWidth + 'x' + ddVideo.videoHeight + ' readyState=' + ddVideo.readyState : 'null'))

                ddLog('Checking pipeline status...')
                fetch('/api/scope/api/v1/pipeline/status').then(function (r) { return r.json() }).then(function (ps) {
                  ddLog('Pipeline status: ' + JSON.stringify(ps), ps.status === 'loaded' ? 'ok' : 'warn')
                }).catch(function (err) { ddLog('Pipeline status check failed: ' + err.message, 'err') })
              }
            }, 10000)
          })
        })
      }

      // ---- Cloud connect (WHIP/WHEP) ----

      // ---- Global visual filters (CSS on canvas) ----
      var hueCtrl = document.getElementById('hueCtrl')

      var contrastVal = document.getElementById('contrastVal')
      var sharpenVal = document.getElementById('sharpenVal')
      // ---- WebGL sharpen overlay ----
      var sharpenCanvas = document.createElement('canvas')

      document.getElementById('stage').appendChild(sharpenCanvas)
      var shGL = sharpenCanvas.getContext('webgl', { alpha: false, premultipliedAlpha: false, preserveDrawingBuffer: false })

          '  vec4 b=texture2D(u_tex,v_uv+vec2(0,px.y));',
          '  vec4 l=texture2D(u_tex,v_uv+vec2(-px.x,0));',
          '  vec4 r=texture2D(u_tex,v_uv+vec2(px.x,0));',

        gl.enableVertexAttribArray(aPos)

      function getFilterState () {

      function applyFilterState (state) {
        if (!state) return
        if (state.hue !== undefined) hueCtrl.value = state.hue

        if (state.bright !== undefined) brightCtrl.value = state.bright
        if (state.contrast !== undefined) contrastCtrl.value = state.contrast

      function buildFilterString (h, s, b, c) {
        return 'hue-rotate(' + h + 'deg) saturate(' + s + '%) brightness(' + b + '%) contrast(' + c + '%)'

      function broadcastFilters (filterStr) {
        // Send to output window via WebSocket relay
        if (relayWs && relayWs.readyState === 1) {
          relayWs.send(JSON.stringify({ type: 'filters', filter: filterStr }))

        // Also apply directly if output window is open (for instant response)
        if (audienceWindow && !audienceWindow.closed) {

            if (v) v.style.filter = filterStr
          } catch (e) {}
        }
      }

      var currentSharpenAmt = 0

      function startSharpenLoop () {
        if (shAnimId || !shGL || !hydraCanvas) return
        sharpenCanvas.style.display = 'block'
        hydraCanvas.style.visibility = 'hidden'

          shAnimId = requestAnimationFrame(tick)

        var s = satCtrl.value

            code: "// Caustics — wide scale, organic speed. CA creatures warp the light\ncaStream('amoeba').out(o1)\n\nsetFunction({\n  name: 'caustic',\n  type: 'src',\n  inputs: [\n    {name: 'scale', type: 'float', default: 3.0},\n    {name: 'spd', type: 'float', default: 0.03},\n    {name: 'hueShift', type: 'float', default: 0.0}\n  ],\n  glsl: `\n    vec2 uv = _st * scale;\n    float t = time * spd;\n    vec2 q = vec2(\n      sin(uv.x*1.7 + uv.y*1.3 + t) + sin(uv.y*2.1 + t*0.7),\n      sin(uv.y*1.9 + uv.x*1.1 + t*0.8) + cos(uv.x*2.3 + t*0.5)\n    ) * 0.5;\n    vec2 r = vec2(\n      sin((uv.x+q.x)*1.3 + (uv.y+q.y)*1.7 + t*0.4),\n      cos((uv.y+q.y)*1.5 + (uv.x+q.x)*1.1 + t*0.3)\n    ) * 0.5;\n    vec2 w1 = uv + q * 2.0;\n    vec2 w2 = uv * 1.3 + r * 1.8;\n    vec2 w3 = uv * 0.8 + (q + r) * 1.2;\n    float c1 = pow(0.5 + 0.5*sin(w1.x*3.14)*sin(w1.y*3.14), 6.0);\n    float c2 = pow(0.5 + 0.5*sin(w2.x*2.7)*sin(w2.y*2.7), 6.0);\n    float c3 = pow(0.5 + 0.5*sin(w3.x*3.5)*sin(w3.y*3.5), 6.0);\n    float cv = max(c1, max(c2, c3));\n    float warpH = atan(r.y + q.x, r.x + q.y) / 6.2831 + 0.5;\n    float warpM = length(q + r);\n    float spatial = (uv.x + uv.y) * 0.08 / scale;\n    float h = warpH * 0.5 + spatial + warpM * 0.3 + hueShift;\n    vec3 lineCol = 0.5 + 0.5 * cos(6.2831 * (h + vec3(0.0, 0.15, 0.4)));\n    vec3 col = lineCol * cv * 2.5;\n    col += vec3(0.015, 0.008, 0.028) * (1.0 - cv) * warpM;\n    col = col / (1.0 + col);\n    col = pow(col, vec3(0.78));\n    return vec4(col, 1.0);\n  `\n})\n\ncaustic(2.5, 0.035, ()=>time*0.004+0.67)\n  .modulate(src(o1), 0.1)\n  .modulateRotate(src(o1), 0.06)\n  .modulateScale(src(o1), 0.03)\n  .out(o2)\n\nsrc(o0)\n  .modulateScale(src(o1), 0.03)\n  .modulateRotate(src(o1), 0.02)\n  .blend(src(o2), 0.35)\n  .modulateScale(noise(1.0, 0.015), 0.004)\n  .modulateRotate(noise(0.2, 0.01), 0.003)\n  .hue(()=>0.005*Math.sin(time*0.012))\n  .luma(0.004, 0.05)\n  .brightness(0.022)\n  .saturate(1.2)\n  .contrast(1.02)\n  .add(src(o1).mult(src(o2)), 0.12)\n  .out(o0)" },

          { name: 'Lenia',
            code: "// Warm osc field — CA blobs modulate the oscillator math\ncaStream('lava_lamp').out(o1)\n\nosc(4, 0.015, 0.6).rotate(()=>time*0.01)\n  .modulate(src(o1), 0.07)\n  .modulateRotate(osc(3, 0.01, 0), 0.04)\n  .mult(src(o1).add(solid(0.3, 0.15, 0.1), 0.8))\n  .color(0.55, 0.3, 0.2).brightness(0.03)\n  .out(o2)\n\nsrc(o0)\n  .modulateScale(src(o1), 0.02)\n  .blend(src(o2), 0.35)\n  .modulateScale(noise(1.5, 0.02), 0.003)\n  .hue(()=>0.003)\n  .luma(0.005, 0.06)\n  .brightness(0.02)\n  .saturate(1.15)\n  .contrast(1.02)\n  .add(src(o1).mult(src(o2)), 0.08)\n  .out(o0)" },

          { name: 'SL Worms',
            code: "// Noise feedback — CA worms tunnel through the texture\ncaStream('sl_worms').out(o1)\n\nnoise(3, 0.025).rotate(()=>time*0.012)\n  .modulate(src(o1), 0.06)\n  .modulateScale(src(o1), 0.04)\n  .color(0.2, 0.45, 0.35).brightness(0.03)\n  .out(o2)\n\nsrc(o0)\n  .modulateRotate(src(o1), 0.03)\n  .blend(src(o2), 0.35)\n  .modulateScale(noise(1.6, 0.03), 0.003)\n  .modulateRotate(noise(0.2, 0.015), 0.003)\n  .hue(()=>0.003)\n  .luma(0.005, 0.06)\n  .brightness(0.022)\n  .saturate(1.15)\n  .contrast(1.02)\n  .add(src(o1).mult(src(o2)), 0.1)\n  .out(o0)" },

          { name: 'MNCA',
            code: "// Voronoi + osc — CA solitons warp both coordinate systems\ncaStream('mnca_worm').out(o1)\n\nvoronoi(8, 0.012, 0.15)\n  .modulate(src(o1), 0.06)\n  .add(osc(5, 0.008, 0.4).rotate(()=>time*0.01)\n    .modulate(src(o1), 0.04), 0.4)\n  .color(0.35, 0.2, 0.55).brightness(0.03)\n  .out(o2)\n\nsrc(o0)\n  .modulateScale(src(o1), 0.025)\n  .blend(src(o2), 0.35)\n  .modulateScale(noise(1.4, 0.02), 0.003)\n  .modulateRotate(noise(0.25, 0.015), 0.003)\n  .hue(()=>0.003)\n  .luma(0.005, 0.06)\n  .brightness(0.022)\n  .saturate(1.2)\n  .contrast(1.02)\n  .add(src(o1).mult(src(o2)), 0.1)\n  .out(o0)" },

          { name: 'MNCA 2',
            code: "// Deep feedback — CA mitosis drives the accumulator\ncaStream('mnca_mitosis').out(o1)\n\nnoise(2, 0.02).rotate(()=>time*0.008)\n  .mult(src(o1).add(solid(0.2, 0.15, 0.35), 0.7))\n  .modulate(src(o1), 0.05)\n  .color(0.3, 0.2, 0.5).brightness(0.03)\n  .out(o2)\n\nsrc(o0)\n  .modulateRotate(src(o1), 0.03)\n  .modulateScale(src(o1), 0.02)\n  .blend(src(o2), 0.3)\n  .modulateScale(noise(1.5, 0.025), 0.004)\n  .hue(()=>0.004)\n  .luma(0.005, 0.06)\n  .brightness(0.022)\n  .saturate(1.15)\n  .contrast(1.02)\n  .add(src(o1).mult(src(o2)), 0.12)\n  .out(o0)" },

          { name: 'CA Flock',
            code: "// Flock shapes — CA vortex distorts their coordinates\ncaStream('tentacles').out(o1)\n\nshape(100, 0.012, 0.01).repeat(8, 6)\n  .scale(()=>0.5+Math.sin(time*0.3)*0.03)\n  .rotate(()=>time*0.08)\n  .scrollX(()=>Math.sin(time*0.1)*0.15)\n  .scrollY(()=>Math.cos(time*0.08)*0.12)\n  .modulate(src(o1), 0.06)\n  .modulateRotate(src(o1), 0.04)\n  .modulate(noise(0.8, 0.03), 0.15)\n  .color(()=>0.45+Math.sin(time*0.09)*0.25, ()=>0.3+Math.cos(time*0.07)*0.2, ()=>0.6+Math.sin(time*0.11)*0.2)\n  .brightness(0.025)\n  .out(o2)\n\nsrc(o0)\n  .modulateScale(src(o1), 0.02)\n  .blend(src(o2), 0.35)\n  .modulateScale(noise(1.4, 0.02), 0.003)\n  .modulateRotate(noise(0.2, 0.015), 0.003)\n  .hue(()=>0.003)\n  .luma(0.005, 0.06)\n  .brightness(0.022)\n  .saturate(1.15)\n  .contrast(1.02)\n  .add(src(o1).mult(src(o2)), 0.1)\n  .out(o0)" },

          { name: 'CA Warp',
            code: "// Deep warp — CA organisms bend space itself\ncaStream('amoeba').out(o1)\n\nnoise(3, 0.015).rotate(()=>time*0.006)\n  .modulate(src(o1), 0.08)\n  .modulateRotate(src(o1), 0.06)\n  .modulateScale(src(o1), 0.03)\n  .color(0.4, 0.3, 0.55).brightness(0.03)\n  .out(o2)\n\nsrc(o0)\n  .modulate(src(o1), 0.03)\n  .modulateRotate(src(o1), 0.02)\n  .blend(src(o2), 0.3)\n  .modulateScale(noise(1.2, 0.015), 0.004)\n  .hue(()=>0.004*Math.sin(time*0.01))\n  .luma(0.004, 0.05)\n  .brightness(0.022)\n  .saturate(1.15)\n  .contrast(1.02)\n  .add(src(o1).mult(src(o2)), 0.12)\n  .out(o0)" },
        ]

        var container = document.getElementById('caPresets')
        caPresets.forEach(function (preset) {
          var btn = document.createElement('button')
          btn.className = 'presetBtn'
          btn.textContent = preset.name
          btn.title = preset.code.split('\n')[0]
          btn.addEventListener('click', function () {
            var code = preset.code
            if (typeof cm !== 'undefined' && cm) {
              cm.setValue(code)
            } else {
              editorEl.value = code
            }
            localStorage.setItem(STORAGE_EDITOR, code)
            currentPresetName = 'CA: ' + preset.name
            currentPresetFile = null
            localStorage.setItem(STORAGE_PRESET_NAME, currentPresetName)
            runCode(code, 'CA: ' + preset.name)
            highlightActivePreset()
          })
          container.appendChild(btn)
        })
      })()

      setNdiButtonState()
      startAudio()
      // keep attempting auto-resume for audio-reactive patches
      let audioRetry = 0
      const audioTimer = setInterval(function () {
        audioRetry += 1
        startAudio()
        if (audioRetry > 20) clearInterval(audioTimer)
      }, 1200)
      window.addEventListener('pointerdown', startAudio, { once: true })
      if (hydra) {
        setStatus('Live coding ready. Ctrl/Cmd+Enter line, Alt+Enter block, Ctrl/Cmd+Shift+Enter all.', false)
      }
    })()
  </script>
