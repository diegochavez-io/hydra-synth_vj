<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Hydra TD Output</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    canvas { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
  <script src="/dist/hydra-synth.js"></script>
  <script>
    // TD Output — independent Hydra instance that mirrors the launcher
    // Use in TouchDesigner Web Render TOP: http://localhost:8080/dist/td-output.html

    // Audio stub
    window.a = {
      fft: [0, 0, 0, 0],
      vol: 0,
      bins: [0, 0, 0, 0],
      setBins: function (n) {
        var size = Math.max(1, Number(n) || 4)
        this.fft = new Array(size).fill(0)
        this.bins = new Array(size).fill(0)
        for (var i = 0; i < size; i++) {
          (function (idx) {
            window['a' + idx] = function (scale, offset) {
              var s = scale === undefined ? 1 : scale
              var o = offset === undefined ? 0 : offset
              return function () { return window.a.fft[idx] * s + o }
            }
          })(i)
        }
      },
      setSmooth: function () {},
      setCutoff: function () {},
      setScale: function () {},
      setMax: function () {},
      show: function () {},
      hide: function () {},
      onBeat: function () {}
    }
    window.a.setBins(4)

    // Init Hydra
    var hydra = new Hydra({ detectAudio: false, makeGlobal: true })
    solid(0, 0, 0, 1).out()

    // Load audio bootstrap inline so it's ready before any code arrives
    var audioBootstrapCode = ''
    var bootstrapReady = false
    fetch('/dist/audio-bootstrap.js', { cache: 'no-store' })
      .then(function (r) { if (!r.ok) throw new Error('not found'); return r.text() })
      .then(function (t) {
        audioBootstrapCode = t
        try { hydra.eval(t) } catch (e) { console.warn('[td-output] bootstrap eval error:', e) }
        bootstrapReady = true
        console.log('[td-output] Audio bootstrap ready.')
        // If code arrived before bootstrap, replay it
        if (pendingCode) {
          runCode(pendingCode)
          pendingCode = null
        }
      })
      .catch(function () {
        bootstrapReady = true
        console.warn('[td-output] audio-bootstrap.js not found, skipping.')
      })

    var pendingCode = null

    function cleanupSources () {
      for (var i = 0; i < 4; i++) {
        var s = hydra.synth['s' + i]
        if (s && s.src && s.src.pause) { s.src.pause(); s.src.src = '' }
        if (s) { s.src = null; s.dynamic = false }
      }
      hydra.eval('solid(0,0,0,1).out(o0); solid(0,0,0,1).out(o1); solid(0,0,0,1).out(o2); solid(0,0,0,1).out(o3)')
    }

    function runCode (code) {
      try {
        cleanupSources()
        if (audioBootstrapCode) hydra.eval(audioBootstrapCode)
        hydra.eval(code)
      } catch (err) {
        console.error('[td-output] eval error:', err)
      }
    }

    // Fit canvas to window
    function fit () {
      if (!hydra || !hydra.canvas) return
      hydra.canvas.width = window.innerWidth
      hydra.canvas.height = window.innerHeight
      if (typeof setResolution === 'function') setResolution(hydra.canvas.width, hydra.canvas.height)
    }
    fit()
    window.addEventListener('resize', fit)

    // Fullscreen on F key
    window.addEventListener('keydown', function (e) {
      if (e.key.toLowerCase() === 'f') {
        document.documentElement.requestFullscreen().catch(function () {})
      }
    })

    // Receive code + filters from launcher via WebSocket relay
    var ws = null
    var retryMs = 500
    function connect () {
      ws = new WebSocket('ws://' + window.location.host)
      ws.onopen = function () { retryMs = 500 }
      ws.onmessage = function (event) {
        try {
          var data = JSON.parse(event.data)
          // Code relay from launcher
          if (data && data.code) {
            if (bootstrapReady) {
              runCode(data.code)
            } else {
              pendingCode = data.code
            }
          }
          // Filter updates
          if (data.type === 'filters' && hydra && hydra.canvas) {
            hydra.canvas.style.filter = data.filter
          }
        } catch (err) {
          console.error('[td-output]', err)
        }
      }
      ws.onclose = function () { setTimeout(connect, retryMs); retryMs = Math.min(retryMs * 2, 5000) }
      ws.onerror = function () { ws.close() }
    }
    connect()
  </script>
</body>
</html>
