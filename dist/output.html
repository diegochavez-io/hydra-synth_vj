<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="manifest" href="output-manifest.json">
  <title>Hydra Output</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    video { display: none; }
    canvas { width: 100vw; height: 100vh; display: block; background: #000; }
  </style>
</head>
<body>
  <video id="v" autoplay muted playsinline></video>
  <canvas id="checkerSrc" style="display:none;"></canvas>
  <canvas id="warpCanvas"></canvas>
  <script src="/dist/hydra-synth.js"></script>
  <script>
    // Detect standalone mode (OBS browser source, no opener)
    var standalone = false
    try { standalone = !window.opener || window.opener.closed } catch (e) { standalone = true }
    if (standalone && typeof window._hydraSourceCanvas === 'undefined') {
      // Run Hydra directly in this page — OBS mirror mode
      (function () {
        var warpCanvas = document.getElementById('warpCanvas')
        warpCanvas.style.display = 'none'

        var hydra = null
        try {
          hydra = new Hydra({ detectAudio: false, makeGlobal: true, canvas: warpCanvas })
        } catch (e) {
          try { hydra = new Hydra({ detectAudio: false, makeGlobal: true }) } catch (e2) {}
        }
        if (hydra) {
          var hCanvas = hydra.canvas
          if (hCanvas !== warpCanvas) {
            // Hydra created its own canvas — use it
            warpCanvas.style.display = 'none'
            hCanvas.style.width = '100vw'
            hCanvas.style.height = '100vh'
            hCanvas.style.display = 'block'
            hCanvas.style.background = '#000'
            document.body.appendChild(hCanvas)
          } else {
            warpCanvas.style.display = 'block'
          }
        }

        // Connect to server WS to receive preset code
        var ws = null, wsRetry = 500
        function connectWs () {
          try {
            ws = new WebSocket('ws://' + window.location.host)
            ws.onopen = function () { wsRetry = 500 }
            ws.onmessage = function (event) {
              var str = event.data
              try {
                var data = JSON.parse(str)
                if (data.type === 'filters') {
                  var target = hydra ? hydra.canvas : warpCanvas
                  target.style.filter = data.filter || ''
                  return
                }
                if (data.type === 'link' || data.type === 'link-status' || data.type === 'warp-update' || data.type === 'map-mode') return
                if (data.code) {
                  try { eval(data.code) } catch (e) { console.warn('[mirror] eval error:', e.message) }
                  return
                }
              } catch (e) {}
              // Raw string fallback — treat as Hydra code
              try { eval(str) } catch (e) { console.warn('[mirror] eval error:', e.message) }
            }
            ws.onclose = function () { ws = null; setTimeout(connectWs, wsRetry); wsRetry = Math.min(wsRetry * 2, 5000) }
            ws.onerror = function () { if (ws) ws.close() }
          } catch (e) { ws = null }
        }
        connectWs()

        // Skip the warp renderer below
        window._standaloneMode = true
      })()
    }

    if (window._standaloneMode) {
      // Standalone mode active — skip warp renderer, just run Hydra directly
    } else {

    // WebGL warp renderer — renders video through a deformable mesh
    var canvas = document.getElementById('warpCanvas')
    var gl = canvas.getContext('webgl', { alpha: false, antialias: false, preserveDrawingBuffer: false })

    var vertSrc = [
      'attribute vec2 a_position;',
      'attribute vec2 a_texcoord;',
      'varying vec2 v_texcoord;',
      'void main() {',
      '  gl_Position = vec4(a_position.x * 2.0 - 1.0, 1.0 - a_position.y * 2.0, 0.0, 1.0);',
      '  v_texcoord = a_texcoord;',
      '}'
    ].join('\n')

    var fragSrc = [
      'precision mediump float;',
      'varying vec2 v_texcoord;',
      'uniform sampler2D u_video;',
      'void main() {',
      '  gl_FragColor = texture2D(u_video, v_texcoord);',
      '}'
    ].join('\n')

    function compileShader(gl, src, type) {
      var s = gl.createShader(type)
      gl.shaderSource(s, src)
      gl.compileShader(s)
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
        console.error(gl.getShaderInfoLog(s))
        return null
      }
      return s
    }

    var vs = compileShader(gl, vertSrc, gl.VERTEX_SHADER)
    var fs = compileShader(gl, fragSrc, gl.FRAGMENT_SHADER)
    var program = gl.createProgram()
    gl.attachShader(program, vs)
    gl.attachShader(program, fs)
    gl.linkProgram(program)
    gl.useProgram(program)

    var aPos = gl.getAttribLocation(program, 'a_position')
    var aTex = gl.getAttribLocation(program, 'a_texcoord')
    var uVideo = gl.getUniformLocation(program, 'u_video')

    var posBuf = gl.createBuffer()
    var texBuf = gl.createBuffer()
    var idxBuf = gl.createBuffer()

    var videoTex = gl.createTexture()
    gl.bindTexture(gl.TEXTURE_2D, videoTex)
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE)
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE)
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR)
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR)
    // Prevent color mangling when reading from Hydra's WebGL canvas
    gl.pixelStorei(gl.UNPACK_PREMULTIPLY_ALPHA_WEBGL, false)
    gl.pixelStorei(gl.UNPACK_COLORSPACE_CONVERSION_WEBGL, gl.NONE)

    // Warp mesh state — default identity (3x3 grid, no distortion)
    var warpState = {
      gridSize: [3, 3],
      points: [
        [0, 0], [0.5, 0], [1, 0],
        [0, 0.5], [0.5, 0.5], [1, 0.5],
        [0, 1], [0.5, 1], [1, 1]
      ]
    }

    function buildMesh(state) {
      var cols = state.gridSize[0]
      var rows = state.gridSize[1]
      var positions = new Float32Array(cols * rows * 2)
      var texcoords = new Float32Array(cols * rows * 2)
      var indices = []

      for (var r = 0; r < rows; r++) {
        for (var c = 0; c < cols; c++) {
          var i = r * cols + c
          positions[i * 2] = state.points[i][0]
          positions[i * 2 + 1] = state.points[i][1]
          texcoords[i * 2] = c / (cols - 1)
          texcoords[i * 2 + 1] = r / (rows - 1)
        }
      }

      for (var r = 0; r < rows - 1; r++) {
        for (var c = 0; c < cols - 1; c++) {
          var tl = r * cols + c
          var tr = tl + 1
          var bl = (r + 1) * cols + c
          var br = bl + 1
          indices.push(tl, bl, tr, tr, bl, br)
        }
      }

      gl.bindBuffer(gl.ARRAY_BUFFER, posBuf)
      gl.bufferData(gl.ARRAY_BUFFER, positions, gl.DYNAMIC_DRAW)
      gl.bindBuffer(gl.ARRAY_BUFFER, texBuf)
      gl.bufferData(gl.ARRAY_BUFFER, texcoords, gl.STATIC_DRAW)
      gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, idxBuf)
      gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array(indices), gl.STATIC_DRAW)
      return indices.length
    }

    var indexCount = buildMesh(warpState)

    // Checkerboard alignment pattern
    var mapModeOn = false
    var checkerCanvas = document.getElementById('checkerSrc')

    function drawChecker (w, h) {
      checkerCanvas.width = w
      checkerCanvas.height = h
      var ctx = checkerCanvas.getContext('2d')
      var tileSize = Math.round(Math.max(w, h) / 16)
      var cols = Math.ceil(w / tileSize)
      var rows = Math.ceil(h / tileSize)
      for (var r = 0; r < rows; r++) {
        for (var c = 0; c < cols; c++) {
          ctx.fillStyle = (r + c) % 2 === 0 ? '#000' : '#fff'
          ctx.fillRect(c * tileSize, r * tileSize, tileSize, tileSize)
        }
      }
      ctx.strokeStyle = '#f00'
      ctx.lineWidth = 2
      ctx.beginPath()
      ctx.moveTo(w / 2, 0)
      ctx.lineTo(w / 2, h)
      ctx.moveTo(0, h / 2)
      ctx.lineTo(w, h / 2)
      ctx.stroke()
      ctx.strokeStyle = '#f00'
      ctx.lineWidth = 3
      ctx.strokeRect(1, 1, w - 2, h - 2)
    }

    // Render loop
    var video = document.getElementById('v')

    // Direct canvas source — grabs frames from opener's Hydra canvas (no captureStream needed)
    var sourceCanvas = null
    var sourceCheckCount = 0
    function getSourceCanvas () {
      // Re-query every ~120 frames (~2s) to catch canvas recreation on resolution change
      sourceCheckCount++
      if (sourceCanvas && sourceCanvas.width > 0 && sourceCanvas.isConnected !== false && sourceCheckCount % 120 !== 0) {
        return sourceCanvas
      }
      sourceCanvas = null
      // Try direct reference from launcher (works even when window.opener is blocked)
      try {
        if (window._hydraSourceCanvas && window._hydraSourceCanvas.width > 0) {
          sourceCanvas = window._hydraSourceCanvas
          return sourceCanvas
        }
      } catch (e) {}
      // Try window.opener (popup case)
      try {
        if (window.opener && !window.opener.closed) {
          var c = window.opener.document.querySelector('#stage canvas')
          if (c && c.width > 0) { sourceCanvas = c; return c }
        }
      } catch (e) { if (sourceCheckCount < 5) console.log('[output] opener access error:', e.message) }
      // Try parent (iframe case)
      try {
        if (window.parent && window.parent !== window) {
          var c = window.parent.document.querySelector('#stage canvas')
          if (c && c.width > 0) { sourceCanvas = c; return c }
        }
      } catch (e) {}
      return null
    }

    function resizeCanvas () {
      canvas.width = window.innerWidth * (window.devicePixelRatio || 1)
      canvas.height = window.innerHeight * (window.devicePixelRatio || 1)
      gl.viewport(0, 0, canvas.width, canvas.height)
    }
    window.addEventListener('resize', resizeCanvas)
    resizeCanvas()

    // Filter sync state
    var lastSyncedFilter = ''
    var filterPollCount = 0

    function render() {
      requestAnimationFrame(render)

      // Sync CSS filter from launcher every ~10 frames
      filterPollCount++
      if (filterPollCount % 10 === 0) {
        var f = ''
        // Try direct reference from launcher (most reliable)
        try { if (window._hydraFilterStr) f = window._hydraFilterStr } catch (e) {}
        // Fallback: read from opener's canvas
        if (!f) {
          try {
            if (window.opener && !window.opener.closed) {
              var srcCanvas = window.opener.document.querySelector('#stage canvas')
              if (srcCanvas) f = srcCanvas.style.filter || ''
            }
          } catch (e) {}
        }
        if (f !== lastSyncedFilter) {
          lastSyncedFilter = f
          canvas.style.filter = f
        }
      }

      // Pick texture source: checkerboard, video stream, or direct canvas fallback
      var src = null
      if (mapModeOn) {
        if (checkerCanvas.width < 2) drawChecker(canvas.width, canvas.height)
        src = checkerCanvas
      } else if (video.readyState >= 2) {
        // Prefer video stream (captureStream) — works cross-window in all browsers
        src = video
      } else {
        // Fallback to direct canvas read (works in Safari, may fail in Chrome)
        var directCanvas = getSourceCanvas()
        if (directCanvas) {
          src = directCanvas
        } else {
          // No source yet — clear to black and keep looping
          gl.clear(gl.COLOR_BUFFER_BIT)
          return
        }
      }

      gl.bindTexture(gl.TEXTURE_2D, videoTex)
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, src)
      gl.clear(gl.COLOR_BUFFER_BIT)
      gl.useProgram(program)
      gl.activeTexture(gl.TEXTURE0)
      gl.bindTexture(gl.TEXTURE_2D, videoTex)
      gl.uniform1i(uVideo, 0)
      gl.bindBuffer(gl.ARRAY_BUFFER, posBuf)
      gl.enableVertexAttribArray(aPos)
      gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0)
      gl.bindBuffer(gl.ARRAY_BUFFER, texBuf)
      gl.enableVertexAttribArray(aTex)
      gl.vertexAttribPointer(aTex, 2, gl.FLOAT, false, 0, 0)
      gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, idxBuf)
      gl.drawElements(gl.TRIANGLES, indexCount, gl.UNSIGNED_SHORT, 0)
    }
    render()

    // Click anywhere or press F to go fullscreen (hides Chrome address bar)
    canvas.addEventListener('click', function () {
      document.documentElement.requestFullscreen().catch(function () {})
    })
    window.addEventListener('keydown', function (e) {
      if (e.key.toLowerCase() === 'f') {
        document.documentElement.requestFullscreen().catch(function () {})
      }
    })

    // Initial filter sync — try direct reference, then opener, retry for 3s
    function syncFilterInitial () {
      var f = ''
      try { if (window._hydraFilterStr) f = window._hydraFilterStr } catch (e) {}
      if (!f) {
        try {
          if (window.opener && !window.opener.closed) {
            var srcCanvas = window.opener.document.querySelector('#stage canvas')
            if (srcCanvas && srcCanvas.style.filter) f = srcCanvas.style.filter
          }
        } catch (e) {}
      }
      if (f) {
        lastSyncedFilter = f
        canvas.style.filter = f
        return true
      }
      return false
    }
    if (!syncFilterInitial()) {
      var syncRetries = 0
      var syncTimer = setInterval(function () {
        syncRetries++
        if (syncFilterInitial() || syncRetries > 15) clearInterval(syncTimer)
      }, 200)
    }

    // WebSocket connection for filter updates and warp mesh updates
    var ws = null
    var wsRetry = 500
    function connectWs () {
      try {
        ws = new WebSocket('ws://' + window.location.host)
        ws.onopen = function () { wsRetry = 500 }
        ws.onmessage = function (event) {
          try {
            var data = JSON.parse(event.data)
            if (data.type === 'warp-update' && data.data) {
              warpState = data.data
              indexCount = buildMesh(warpState)
            }
            if (data.type === 'map-mode') {
              mapModeOn = !!data.active
              if (mapModeOn) drawChecker(canvas.width, canvas.height)
            }
            if (data.type === 'filters') {
              lastSyncedFilter = data.filter || ''
              canvas.style.filter = data.filter
            }
          } catch (e) {}
        }
        ws.onclose = function () { ws = null; setTimeout(connectWs, wsRetry); wsRetry = Math.min(wsRetry * 2, 5000) }
        ws.onerror = function () { if (ws) ws.close() }
      } catch (e) { ws = null }
    }
    connectWs()

    } // end else (warp renderer mode)
  </script>
</body>
</html>
